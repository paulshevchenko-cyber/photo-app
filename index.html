<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0E0E12"/>
<title>Фото на документы РФ</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0E0E12;overflow:hidden}
body{font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;font-family:inherit}
button:active{opacity:.72}

.app{
  height:100dvh;display:flex;flex-direction:column;
  background:#0E0E12;color:#E8D5A3;
  max-width:480px;margin:0 auto;
}

/* header */
.hdr{padding:9px 14px 7px;border-bottom:1px solid rgba(232,213,163,.1);background:#000;flex-shrink:0}
.hdr-title{font-size:10px;letter-spacing:.16em;color:#F5C842;font-weight:bold;margin-bottom:7px}
.pills{display:flex;gap:5px}
.pill{background:transparent;border:1px solid rgba(232,213,163,.2);border-radius:3px;
  color:rgba(232,213,163,.45);font-size:10px;padding:4px 10px;letter-spacing:.04em}
.pill.on{background:rgba(245,200,66,.12);border-color:#F5C842;color:#F5C842}
.sub{font-size:9px;color:rgba(232,213,163,.32);margin-top:4px;letter-spacing:.06em}

/* viewfinder — flex:1, canvas fills it */
.vf{
  flex:1;position:relative;background:#000;overflow:hidden;min-height:0;
}
#liveC{
  position:absolute;inset:0;width:100%;height:100%;display:block;
}

/* hint */
.hint{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);font-size:10px;padding:6px 16px;
  border-radius:20px;pointer-events:none;white-space:nowrap;
  border:1px solid rgba(232,213,163,.15);color:rgba(232,213,163,.82);
  letter-spacing:.05em;max-width:92%;text-align:center;
  transition:color .2s,border-color .2s;
}
.hint.ok  {color:#4ade80;border-color:rgba(74,222,128,.42)}
.hint.warn{color:#fb923c;border-color:rgba(251,146,60,.38)}

/* flash */
.flash{
  position:absolute;inset:0;background:#fff;z-index:10;
  animation:fl .22s forwards;pointer-events:none;
}
@keyframes fl{to{opacity:0}}

/* processing */
.proc{
  position:absolute;inset:0;background:rgba(0,0,0,.9);z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.spin{width:36px;height:36px;border:3px solid rgba(245,200,66,.15);
  border-top-color:#F5C842;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.proc p{color:#E8D5A3;font-size:11px;letter-spacing:.12em}
.proc small{font-size:9px;color:rgba(232,213,163,.4);letter-spacing:.07em}

/* cam error */
.cam-err{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;padding:28px;
  background:rgba(0,0,0,.9);color:#E8D5A3;font-size:13px;
  text-align:center;line-height:1.6;
}

/* preview */
.prev-wrap{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;background:#111;z-index:5;
}
.prev-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.prev-badge{
  position:absolute;top:10px;right:10px;background:rgba(0,0,0,.8);
  border:1px solid #4ade80;border-radius:4px;padding:4px 10px;
  font-size:10px;color:#fff;letter-spacing:.05em;
}

/* model loading indicator */
.mbar{height:2px;background:rgba(245,200,66,.12);flex-shrink:0;overflow:hidden}
.mbar-fill{height:100%;background:#F5C842;animation:mb 1.4s ease-in-out infinite}
@keyframes mb{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* status bar */
.sbar{display:flex;gap:4px;padding:5px 8px;background:rgba(0,0,0,.5);
  border-top:1px solid rgba(232,213,163,.08);flex-shrink:0}
.sp{flex:1;min-width:0;display:flex;align-items:center;gap:4px;
  padding:4px 6px;border-radius:3px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);font-size:8.5px;letter-spacing:.04em}
.sd{width:6px;height:6px;min-width:6px;border-radius:50%;transition:background .25s}
.st{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .25s}

/* controls */
.ctrl{
  display:flex;align-items:center;justify-content:space-around;
  padding:12px 24px;background:#0E0E12;
  border-top:1px solid rgba(232,213,163,.08);gap:10px;flex-shrink:0;
}
.cbtn{
  width:64px;height:64px;border-radius:50%;border:3px solid #F5C842;
  background:transparent;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 0 14px rgba(245,200,66,.14);transition:border-color .25s,box-shadow .25s;
}
.cbtn.rdy{border-color:#4ade80;animation:rp 1.6s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 14px rgba(74,222,128,.2)}50%{box-shadow:0 0 28px rgba(74,222,128,.55)}}
.cbtn:active{transform:scale(.93)}
.ci{width:48px;height:48px;border-radius:50%;background:#F5C842;transition:background .25s;pointer-events:none}
.cbtn.rdy .ci{background:#4ade80}
.icobtn{
  width:42px;height:42px;border-radius:50%;border:1px solid rgba(232,213,163,.2);
  background:rgba(232,213,163,.04);color:#E8D5A3;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;
}
.icobtn.on{border-color:#60a5fa;background:rgba(96,165,250,.1)}
.abtn{
  flex:1;padding:11px 0;background:transparent;
  border:1px solid rgba(232,213,163,.25);color:#E8D5A3;
  border-radius:4px;font-size:11px;letter-spacing:.1em;
}
.abtn.p{background:rgba(245,200,66,.12);border-color:#F5C842;color:#F5C842}

/* requirements */
.req{padding:7px 14px 10px;border-top:1px solid rgba(232,213,163,.07);
  background:rgba(0,0,0,.25);flex-shrink:0}
.req h4{font-size:8px;letter-spacing:.2em;color:rgba(232,213,163,.28);margin-bottom:5px}
.req-g{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.ri{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;
  border-bottom:1px solid rgba(232,213,163,.06)}
.rk{color:rgba(232,213,163,.35)}
.rv{color:rgba(232,213,163,.7);text-align:right}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';

// ── Config ──────────────────────────────────────────────────────────
const TYPES = {
  passport:{ label:'Паспорт / Загран', size:'35×45 мм', aspect:35/45, desc:'Загранпаспорт, ВНЖ, СНИЛС' },
  visa:    { label:'Виза',             size:'35×45 мм', aspect:35/45, desc:'Шенген, US, UK, Китай' },
  zagran:  { label:'Воен. билет',      size:'30×40 мм', aspect:30/40, desc:'Военный билет, приписное' },
};
const REQS = [
  ['Размер',null],['Лицо','70–80% высоты'],
  ['Фон','белый / светло-серый'],['Взгляд','прямо в объектив'],
  ['Выражение','нейтральное'],['Качество','без теней, резкое'],
];

// Face frame proportions
const FR = { ovalCY:.47, ovalH:.74, ovalW:.54, eyeY:.55, chinY:.85, crownY:.11 };

// ── State ───────────────────────────────────────────────────────────
const S = {
  type:'passport', facing:'user', captured:null,
  faceStatus:'init', headStatus:'init', lightStatus:'init',
  bgRemove:false, modelReady:false,
};

// ── DOM refs ────────────────────────────────────────────────────────
let liveCanvas, captureCanvas, hintEl;
let video, stream;
let blazeModel = null;
let rafId = null, analyzeTimer = null;

// ── App boot ────────────────────────────────────────────────────────
function boot() {
  document.getElementById('root').innerHTML = buildShell();
  liveCanvas    = document.getElementById('liveC');
  captureCanvas = document.createElement('canvas');
  hintEl        = document.getElementById('hintEl');
  video         = document.createElement('video');
  video.autoplay = true; video.playsInline = true; video.muted = true;

  startCamera();
  loadModel();
}

// ── Shell (static structure, not re-rendered) ───────────────────────
function buildShell() {
  const t = TYPES[S.type];
  return `
<div class="app">
  <div class="hdr">
    <div class="hdr-title">⊞ ФОТО НА ДОКУМЕНТЫ РФ</div>
    <div class="pills" id="pills">
      ${Object.entries(TYPES).map(([k,v])=>
        `<button class="pill${S.type===k?' on':''}" onclick="setType('${k}')">${v.label}</button>`
      ).join('')}
    </div>
    <div class="sub" id="subDesc">${t.size} · ${t.desc}</div>
  </div>

  <div class="vf" id="vf">
    <canvas id="liveC"></canvas>
    <div id="hintEl" class="hint">Инициализация...</div>
  </div>

  <div id="mbar" class="mbar"><div class="mbar-fill"></div></div>

  <div class="sbar" id="sbar">
    ${pill('face','init')}${pill('head','init')}${pill('light','init')}
  </div>

  <div class="ctrl" id="ctrl">
    <button class="icobtn" id="flipBtn" onclick="flipCam()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7h-9"/><path d="M14 17H5"/>
        <polyline points="17 4 20 7 17 10"/><polyline points="8 14 5 17 8 20"/>
      </svg>
    </button>
    <button class="cbtn" id="capBtn" onclick="doCapture()"><div class="ci"></div></button>
    <button class="icobtn" id="bgBtn" onclick="toggleBg()" title="Замена фона на белый при съёмке">🪄</button>
  </div>

  <div class="req">
    <h4>ТРЕБОВАНИЯ ГОСТ Р 52425-2005</h4>
    <div class="req-g" id="reqGrid"></div>
  </div>
</div>`;
}

function updateReqGrid() {
  const g = document.getElementById('reqGrid');
  if (!g) return;
  const t = TYPES[S.type];
  g.innerHTML = REQS.map(([k,v])=>
    `<div class="ri"><span class="rk">${k}</span><span class="rv">${v||t.size}</span></div>`
  ).join('');
}

// ── Camera ──────────────────────────────────────────────────────────
async function startCamera() {
  cancelAnimationFrame(rafId);
  clearTimeout(analyzeTimer);
  if (stream) stream.getTracks().forEach(t=>t.stop());
  S.faceStatus='init'; S.headStatus='init'; S.lightStatus='init';
  updateSbar(); updateHint();

  // Hide preview if showing
  const pw = document.getElementById('prevWrap');
  if (pw) pw.remove();
  S.captured = null;
  showCaptureControls();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:S.facing, width:{ideal:1920}, height:{ideal:1080} },
      audio:false,
    });
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', onVideoReady, {once:true});
  } catch(e) {
    showError('Нет доступа к камере.<br>Разрешите камеру в настройках браузера.');
  }
}

function onVideoReady() {
  startRender();
  scheduleAnalyze(1000);
  updateReqGrid();
}

// ── Render loop — draws video + overlay on one canvas ───────────────
function startRender() {
  const vf = document.getElementById('vf');

  function frame() {
    if (!liveCanvas || !video || video.readyState < 2) {
      rafId = requestAnimationFrame(frame); return;
    }

    // Match canvas pixel size to CSS display size
    const W = vf.clientWidth;
    const H = vf.clientHeight;
    const dpr = window.devicePixelRatio || 1;
    const PW = Math.round(W * dpr);
    const PH = Math.round(H * dpr);
    if (liveCanvas.width !== PW || liveCanvas.height !== PH) {
      liveCanvas.width  = PW;
      liveCanvas.height = PH;
      liveCanvas.style.width  = W + 'px';
      liveCanvas.style.height = H + 'px';
    }

    const ctx = liveCanvas.getContext('2d');

    // Draw video (cover-fit)
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) { rafId = requestAnimationFrame(frame); return; }

    const scale = Math.max(PW/vw, PH/vh);
    const dw = vw*scale, dh = vh*scale;
    const dx = (PW-dw)/2, dy = (PH-dh)/2;

    // Mirror front camera
    if (S.facing === 'user') {
      ctx.save();
      ctx.translate(PW, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, dx, dy, dw, dh);
      ctx.restore();
    } else {
      ctx.drawImage(video, dx, dy, dw, dh);
    }

    // Draw overlay on top
    drawOverlay(ctx, PW, PH);

    rafId = requestAnimationFrame(frame);
  }
  rafId = requestAnimationFrame(frame);
}

// ── Overlay drawn directly on canvas ────────────────────────────────
function drawOverlay(ctx, W, H) {
  const { aspect, size } = TYPES[S.type];

  // Frame dimensions
  let fH = H * 0.83, fW = fH * aspect;
  if (fW > W * 0.78) { fW = W * 0.78; fH = fW / aspect; }
  const fX = (W - fW) / 2, fY = (H - fH) / 2;

  // Darken outside frame
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, 0, W, H);
  ctx.clearRect(fX, fY, fW, fH);  // punch hole
  ctx.restore();

  // Redraw video inside frame (hole is transparent, we need to clip & redraw)
  // Actually easier: draw vignette as 4 dark rects around frame
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.fillRect(0, 0, W, fY);                          // top
  ctx.fillRect(0, fY+fH, W, H-(fY+fH));              // bottom
  ctx.fillRect(0, fY, fX, fH);                        // left
  ctx.fillRect(fX+fW, fY, W-(fX+fW), fH);            // right

  // The above approach won't work cleanly. Let's use compositing properly:
  // We'll just draw semi-transparent rects over the 4 sides.
  // The frame interior is untouched (shows video).

  // Frame border
  ctx.strokeStyle = 'rgba(232,213,163,0.55)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(fX, fY, fW, fH);

  // Determine colours based on status
  const allOk = S.faceStatus==='ok' && (S.headStatus==='ok'||S.headStatus==='na');
  const anyWarn = S.faceStatus!=='ok' && S.faceStatus!=='init';
  const cornerColor = allOk ? '#4ade80' : '#F5C842';
  const ovalColor   = allOk ? 'rgba(74,222,128,0.85)'
                    : anyWarn ? 'rgba(249,115,22,0.8)'
                    : 'rgba(245,200,66,0.55)';

  // Corner accents
  const L = 18;
  const corners = [[fX,fY,1,1],[fX+fW,fY,-1,1],[fX,fY+fH,1,-1],[fX+fW,fY+fH,-1,-1]];
  ctx.strokeStyle = cornerColor;
  ctx.lineWidth = 2.5 * (window.devicePixelRatio||1) * 0.5;
  ctx.lineCap = 'round';
  for (const [cx,cy,dx,dy] of corners) {
    ctx.beginPath(); ctx.moveTo(cx+dx*L,cy); ctx.lineTo(cx,cy); ctx.lineTo(cx,cy+dy*L);
    ctx.stroke();
  }

  // Face oval
  const oCX = fX + fW/2;
  const oCY = fY + fH * FR.ovalCY;
  const oRX = fW * FR.ovalW / 2;
  const oRY = fH * FR.ovalH / 2;
  ctx.strokeStyle = ovalColor;
  ctx.lineWidth = 1.8;
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.ellipse(oCX, oCY, oRX, oRY, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Guide lines
  const dpr = window.devicePixelRatio || 1;
  ctx.lineWidth = 1;
  ctx.setLineDash([3,5]);

  const eyeY   = fY + fH * FR.eyeY;
  const crownY = fY + fH * FR.crownY;
  const chinY  = fY + fH * FR.chinY;

  ctx.strokeStyle = 'rgba(245,200,66,0.3)';
  ctx.beginPath(); ctx.moveTo(fX+fW*.28,crownY); ctx.lineTo(fX+fW*.72,crownY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fX+fW*.28,chinY);  ctx.lineTo(fX+fW*.72,chinY);  ctx.stroke();
  ctx.strokeStyle = 'rgba(100,200,255,0.3)';
  ctx.beginPath(); ctx.moveTo(fX+fW*.18,eyeY);   ctx.lineTo(fX+fW*.82,eyeY);   ctx.stroke();
  ctx.setLineDash([]);

  // Labels (right side if room)
  const lblX = fX + fW + 8;
  const room = W - (fX + fW) > 36;
  ctx.font = `${Math.round(9*dpr*0.6)}px monospace`;
  ctx.fillStyle = 'rgba(245,200,66,0.6)';
  if (room) {
    ctx.fillText('темя',  lblX, crownY+4);
    ctx.fillText('подб.', lblX, chinY+4);
    ctx.fillStyle = 'rgba(100,200,255,0.6)';
    ctx.fillText('глаза', lblX, eyeY+4);
  }

  // Size label above frame
  ctx.fillStyle = 'rgba(232,213,163,0.65)';
  ctx.font = `${Math.round(10*dpr*0.6)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(size, fX + fW/2, fY - 8);
  ctx.textAlign = 'left';
}

// ── BlazeFace model ──────────────────────────────────────────────────
async function loadModel() {
  try {
    await tf.setBackend('webgl');
    await tf.ready();
    blazeModel = await blazeface.load();
    S.modelReady = true;
    const mb = document.getElementById('mbar');
    if (mb) mb.remove();
  } catch(e) {
    console.warn('BlazeFace:', e);
    S.modelReady = false;
    S.faceStatus = 'na'; S.headStatus = 'na';
    updateSbar(); updateHint();
    const mb = document.getElementById('mbar');
    if (mb) mb.remove();
  }
}

// ── Analysis ─────────────────────────────────────────────────────────
function scheduleAnalyze(delay) {
  clearTimeout(analyzeTimer);
  analyzeTimer = setTimeout(runAnalysis, delay || 700);
}

async function runAnalysis() {
  if (S.captured) return;
  if (!video || video.readyState < 2 || !video.videoWidth) { scheduleAnalyze(500); return; }

  // Brightness
  try {
    const W=64, H=48;
    const c=document.createElement('canvas'); c.width=W; c.height=H;
    const ctx=c.getContext('2d');
    ctx.drawImage(video, video.videoWidth*.25, video.videoHeight*.15,
                  video.videoWidth*.5, video.videoHeight*.7, 0,0,W,H);
    const d=ctx.getImageData(0,0,W,H).data;
    let sum=0,lSum=0,rSum=0;
    for (let i=0;i<W*H;i++) {
      const b=.299*d[i*4]+.587*d[i*4+1]+.114*d[i*4+2];
      sum+=b; (i%W<W/2?lSum:rSum)+=b;
    }
    const avg=sum/(W*H), even=avg>0?Math.abs(lSum-rSum)/(avg*W*H):0;
    if(avg<72)        S.lightStatus='dark';
    else if(avg>228)  S.lightStatus='bright';
    else if(even>.3)  S.lightStatus='uneven';
    else              S.lightStatus='ok';
  } catch{ S.lightStatus='ok'; }

  // Face + head
  if (blazeModel) {
    try {
      const preds = await blazeModel.estimateFaces(video, false);
      if (preds.length) {
        const p=preds[0], vw=video.videoWidth, vh=video.videoHeight;
        const [x1,y1]=p.topLeft, [x2,y2]=p.bottomRight;
        const fw=x2-x1, fh=y2-y1;
        const cx=(x1+x2)/2/vw, cy=(y1+y2)/2/vh;
        const nh=fh/vh;

        // Position
        if      (nh<.30)             S.faceStatus='far';
        else if (nh>.82)             S.faceStatus='close';
        else if (Math.abs(cx-.5)>.15||Math.abs(cy-.47)>.16) S.faceStatus='center';
        else                         S.faceStatus='ok';

        // Head pose from landmarks [re,le,nose,mouth,rEar,lEar]
        const lm=p.landmarks;
        if (lm && lm.length>=4) {
          const re=lm[0],le=lm[1],nose=lm[2],mouth=lm[3];
          const roll=Math.atan2(le[1]-re[1], le[0]-re[0])*180/Math.PI;
          if      (roll>9)   S.headStatus='tilt_r';
          else if (roll<-9)  S.headStatus='tilt_l';
          else {
            const eyeMX=(re[0]+le[0])/2, eyeMY=(re[1]+le[1])/2;
            const yaw=(nose[0]-eyeMX)/fw;
            if      (yaw>.09)  S.headStatus='turn_r';
            else if (yaw<-.09) S.headStatus='turn_l';
            else {
              const e2n=(nose[1]-eyeMY)/fh;
              const n2m=(mouth[1]-nose[1])/fh;
              if      (e2n<.18||n2m>.40) S.headStatus='up';
              else if (e2n>.43||n2m<.11) S.headStatus='down';
              else                       S.headStatus='ok';
            }
          }
        } else { S.headStatus='na'; }
      } else {
        S.faceStatus='none'; S.headStatus='na';
      }
    } catch { S.faceStatus='ok'; S.headStatus='na'; }
  } else if (!S.modelReady) {
    if (S.faceStatus==='init') { S.faceStatus='na'; S.headStatus='na'; }
  }

  updateSbar();
  updateHint();
  scheduleAnalyze(700);
}

// ── Status bar ────────────────────────────────────────────────────────
const PCFG = {
  face:{
    init:['#666','Инициализация...'],
    na:  ['#888','Позиция — вручную'],
    none:['#ef4444','Лицо не найдено'],
    close:['#f97316','Отойдите дальше'],
    far:  ['#f97316','Подойдите ближе'],
    center:['#f97316','Выровняйте центр'],
    ok:  ['#4ade80','Позиция ✓'],
  },
  head:{
    init:   ['#666','Анализ...'],
    na:     ['#888','Голова — вручную'],
    tilt_l: ['#f97316','Наклон влево'],
    tilt_r: ['#f97316','Наклон вправо'],
    turn_l: ['#f97316','Повернитесь вправо'],
    turn_r: ['#f97316','Повернитесь влево'],
    up:     ['#f97316','Опустите подбородок'],
    down:   ['#f97316','Поднимите подбородок'],
    ok:     ['#4ade80','Голова ✓'],
  },
  light:{
    init:   ['#666','Анализ...'],
    dark:   ['#ef4444','Слишком темно'],
    bright: ['#f97316','Слишком ярко'],
    uneven: ['#f97316','Неравный свет'],
    ok:     ['#4ade80','Свет ✓'],
  },
};

function pill(type, status) {
  const cfg=PCFG[type]; const [dot,text]=(cfg[status]||cfg.init);
  const bc=dot==='#4ade80'?'rgba(74,222,128,.22)':'rgba(255,255,255,.07)';
  return `<div class="sp" style="border-color:${bc}">
    <div class="sd" style="background:${dot}"></div>
    <span class="st" style="color:${dot}">${text}</span>
  </div>`;
}

function updateSbar() {
  const sb=document.getElementById('sbar');
  if(sb) sb.innerHTML=pill('face',S.faceStatus)+pill('head',S.headStatus)+pill('light',S.lightStatus);
}

function isReady() {
  return S.faceStatus==='ok'
    && (S.headStatus==='ok'||S.headStatus==='na')
    && S.lightStatus==='ok';
}

function updateHint() {
  if(!hintEl) return;
  const f=S.faceStatus, h=S.headStatus, l=S.lightStatus;
  let txt='', cls='';
  if(f==='init')          txt='Инициализация...';
  else if(f==='none')   { txt='Встаньте перед камерой'; cls='warn'; }
  else if(f==='close')  { txt='Отойдите дальше'; cls='warn'; }
  else if(f==='far')    { txt='Подойдите ближе'; cls='warn'; }
  else if(f==='center') { txt='Выровняйте лицо по центру'; cls='warn'; }
  else if(h==='tilt_l') { txt='Наклоните голову вправо'; cls='warn'; }
  else if(h==='tilt_r') { txt='Наклоните голову влево'; cls='warn'; }
  else if(h==='turn_l') { txt='Повернитесь правее'; cls='warn'; }
  else if(h==='turn_r') { txt='Повернитесь левее'; cls='warn'; }
  else if(h==='up')     { txt='Опустите подбородок'; cls='warn'; }
  else if(h==='down')   { txt='Поднимите подбородок'; cls='warn'; }
  else if(l==='dark')   { txt='Добавьте освещения'; cls='warn'; }
  else if(l==='bright') { txt='Уменьшите яркость'; cls='warn'; }
  else if(l==='uneven') { txt='Нужен свет с обеих сторон'; cls='warn'; }
  else if(isReady())    { txt='✓ Готово — нажмите кнопку'; cls='ok'; }
  else                    txt='Совместите лицо с овалом';
  hintEl.textContent=txt;
  hintEl.className='hint'+(cls?' '+cls:'');
  const cb=document.getElementById('capBtn');
  if(cb) cb.className='cbtn'+(isReady()?' rdy':'');
}

// ── Capture ───────────────────────────────────────────────────────────
async function doCapture() {
  if(!video||video.readyState<2) return;

  // Flash
  const vf=document.getElementById('vf');
  const fl=document.createElement('div'); fl.className='flash';
  vf.appendChild(fl); setTimeout(()=>fl.remove(),300);

  // Show processing overlay
  const po=document.createElement('div'); po.className='proc';
  po.innerHTML=`<div class="spin"></div><p>ОБРАБОТКА</p>
    <small>${S.bgRemove?'удаление фона · ':''}коррекция света</small>`;
  vf.appendChild(po);

  await new Promise(r=>setTimeout(r,80));

  // Crop video to document aspect ratio
  const { aspect } = TYPES[S.type];
  const vw=video.videoWidth, vh=video.videoHeight;
  let cW, cH;
  if (vw/vh > aspect) { cH=vh; cW=Math.round(vh*aspect); }
  else                { cW=vw; cH=Math.round(vw/aspect); }
  const srcX=Math.round((vw-cW)/2);
  const srcY=Math.round((vh-cH)/2);

  captureCanvas.width=cW; captureCanvas.height=cH;
  const ctx=captureCanvas.getContext('2d');

  if (S.facing==='user') {
    ctx.translate(cW,0); ctx.scale(-1,1);
    ctx.drawImage(video, srcX, srcY, cW, cH, 0, 0, cW, cH);
    ctx.setTransform(1,0,0,1,0,0);
  } else {
    ctx.drawImage(video, srcX, srcY, cW, cH, 0, 0, cW, cH);
  }

  // Post-process
  try {
    if (S.bgRemove) removeBg(ctx, cW, cH);
    smoothLight(ctx, cW, cH);
  } catch(e) { console.warn(e); }

  S.captured = captureCanvas.toDataURL('image/jpeg', 0.95);

  // Stop camera
  cancelAnimationFrame(rafId);
  clearTimeout(analyzeTimer);

  // Show preview
  po.remove();
  vf.innerHTML=''; // clear canvas etc
  vf.insertAdjacentHTML('beforeend',
    `<div class="prev-wrap" id="prevWrap">
      <img src="${S.captured}" alt="preview"/>
      <div class="prev-badge">✓ Фото готово</div>
    </div>`);
  showPreviewControls();
}

// ── Background removal (flood-fill from edges) ────────────────────────
function removeBg(ctx, w, h) {
  const imgData=ctx.getImageData(0,0,w,h);
  const d=imgData.data;

  // Sample bg colour from 4 edge strips
  let rS=0,gS=0,bS=0,cnt=0;
  const s=3;
  for(let x=0;x<w;x++)  { for(let row=0;row<s;row++)   addSmp(x,row);
                           for(let row=h-s;row<h;row++) addSmp(x,row); }
  for(let y=s;y<h-s;y++) { for(let col=0;col<s;col++)   addSmp(col,y);
                            for(let col=w-s;col<w;col++) addSmp(col,y); }
  function addSmp(x,y){ const i=(y*w+x)*4; rS+=d[i];gS+=d[i+1];bS+=d[i+2];cnt++; }
  const bgR=rS/cnt, bgG=gS/cnt, bgB=bS/cnt, thr=62;

  // BFS flood-fill from all edge pixels
  const visited=new Uint8Array(w*h);
  const q=[];
  function enq(x,y){
    if(x<0||x>=w||y<0||y>=h)return;
    const idx=y*w+x; if(visited[idx])return; visited[idx]=1;
    const i=idx*4;
    const dr=d[i]-bgR,dg=d[i+1]-bgG,db=d[i+2]-bgB;
    if(Math.sqrt(dr*dr+dg*dg+db*db)<thr) q.push(idx);
  }
  for(let x=0;x<w;x++){enq(x,0);enq(x,h-1);}
  for(let y=1;y<h-1;y++){enq(0,y);enq(w-1,y);}

  while(q.length){
    const idx=q.pop();
    d[idx*4]=255; d[idx*4+1]=255; d[idx*4+2]=255;
    const x=idx%w, y=(idx/w)|0;
    enq(x+1,y);enq(x-1,y);enq(x,y+1);enq(x,y-1);
  }
  ctx.putImageData(imgData,0,0);
}

// ── Light normalisation ───────────────────────────────────────────────
function smoothLight(ctx, w, h) {
  const imgData=ctx.getImageData(0,0,w,h);
  const d=imgData.data;
  const fx=w*.18|0, fy=h*.05|0, fw=(w*.64)|0, fh=(h*.78)|0;
  let sum=0,cnt=0;
  for(let y=fy;y<Math.min(fy+fh,h);y++)
    for(let x=fx;x<Math.min(fx+fw,w);x++){
      const i=(y*w+x)*4;
      if(d[i]>250&&d[i+1]>250&&d[i+2]>250) continue;
      sum+=.299*d[i]+.587*d[i+1]+.114*d[i+2]; cnt++;
    }
  if(!cnt||sum===0) return;
  const mult=158/(sum/cnt);
  if(Math.abs(mult-1)<.06) return;
  const cl=v=>Math.max(0,Math.min(255,v|0));
  for(let y=fy;y<Math.min(fy+fh,h);y++)
    for(let x=fx;x<Math.min(fx+fw,w);x++){
      const i=(y*w+x)*4;
      if(d[i]>250&&d[i+1]>250&&d[i+2]>250) continue;
      d[i]=cl(d[i]*mult); d[i+1]=cl(d[i+1]*mult); d[i+2]=cl(d[i+2]*mult);
    }
  ctx.putImageData(imgData,0,0);
}

// ── Controls switching ────────────────────────────────────────────────
function showCaptureControls() {
  const ctrl=document.getElementById('ctrl');
  if(!ctrl) return;
  ctrl.innerHTML=`
    <button class="icobtn" onclick="flipCam()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7h-9"/><path d="M14 17H5"/>
        <polyline points="17 4 20 7 17 10"/><polyline points="8 14 5 17 8 20"/>
      </svg>
    </button>
    <button class="cbtn" id="capBtn" onclick="doCapture()"><div class="ci"></div></button>
    <button class="icobtn${S.bgRemove?' on':''}" id="bgBtn" onclick="toggleBg()" title="Замена фона">🪄</button>`;
  hintEl=document.getElementById('hintEl'); // re-bind after re-render
  updateHint();
}

function showPreviewControls() {
  const ctrl=document.getElementById('ctrl');
  if(!ctrl) return;
  ctrl.innerHTML=`
    <button class="abtn" onclick="retake()">↩ Переснять</button>
    <button class="abtn p" onclick="dlPhoto()">↓ Сохранить</button>`;
  const sb=document.getElementById('sbar'); if(sb) sb.style.display='none';
}

// ── User actions ──────────────────────────────────────────────────────
function setType(k) {
  S.type=k;
  // Update pills
  document.querySelectorAll('.pill').forEach((b,i)=>{
    b.className='pill'+(Object.keys(TYPES)[i]===k?' on':'');
  });
  document.getElementById('subDesc').textContent=`${TYPES[k].size} · ${TYPES[k].desc}`;
  updateReqGrid();
}

function flipCam() {
  S.facing = S.facing==='user'?'environment':'user';
  // Clear viewfinder then restart
  const vf=document.getElementById('vf');
  vf.innerHTML='<canvas id="liveC"></canvas><div id="hintEl" class="hint">Инициализация...</div>';
  liveCanvas=document.getElementById('liveC');
  hintEl=document.getElementById('hintEl');
  const sb=document.getElementById('sbar');if(sb)sb.style.display='flex';
  showCaptureControls();
  startCamera();
}

function toggleBg() {
  S.bgRemove=!S.bgRemove;
  const b=document.getElementById('bgBtn');
  if(b) {
    b.className='icobtn'+(S.bgRemove?' on':'');
    b.title=S.bgRemove?'Замена фона ВКЛ (при съёмке)':'Замена фона на белый при съёмке';
  }
}

function retake() {
  S.captured=null;
  const vf=document.getElementById('vf');
  vf.innerHTML='<canvas id="liveC"></canvas><div id="hintEl" class="hint">Инициализация...</div>';
  liveCanvas=document.getElementById('liveC');
  hintEl=document.getElementById('hintEl');
  const sb=document.getElementById('sbar');if(sb)sb.style.display='flex';
  showCaptureControls();
  startCamera();
}

function dlPhoto() {
  if(!S.captured) return;
  const a=document.createElement('a');
  a.href=S.captured; a.download=`doc_photo_${Date.now()}.jpg`; a.click();
}

function showError(msg) {
  const vf=document.getElementById('vf');
  if(vf) vf.insertAdjacentHTML('beforeend',
    `<div class="cam-err">📷<br>${msg}</div>`);
}

// ── Go ───────────────────────────────────────────────────────────────
boot();
</script>

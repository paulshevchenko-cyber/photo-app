<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0E0E12"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Фото на документы РФ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0E0E12;overflow:hidden}
body{font-family:'Courier New',monospace;-webkit-tap-highlight-color:transparent;color:#E8D5A3}
button{cursor:pointer;font-family:inherit;background:none;border:none;outline:none;-webkit-appearance:none}
button:active{transform:scale(.95);opacity:.8}
input,select,textarea{font-family:inherit}

.app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* Ad slots — reserved space, hidden by default. Activate via ?ads=1 or localStorage.ads='1'. */
.ad-slot{flex-shrink:0;min-height:50px;background:repeating-linear-gradient(45deg,rgba(232,213,163,.04),rgba(232,213,163,.04) 8px,transparent 8px,transparent 16px);
         display:none;align-items:center;justify-content:center;font-size:9px;color:rgba(232,213,163,.3);letter-spacing:.1em}
.ad-slot.show{display:flex}

/* Header */
.hdr{flex-shrink:0;padding:9px 14px 7px;border-bottom:1px solid rgba(232,213,163,.1);background:#000}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.hdr-title{font-size:10px;letter-spacing:.16em;color:#F5C842;font-weight:700}
.hdr-cog{font-size:14px;color:rgba(232,213,163,.6);padding:2px 6px;border-radius:3px}
.hdr-cog:hover{color:#F5C842}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{border:1px solid rgba(232,213,163,.2);border-radius:3px;color:rgba(232,213,163,.45);
      font-size:10px;padding:4px 10px;letter-spacing:.04em;transition:all .15s}
.pill.on{background:rgba(245,200,66,.12);border-color:#F5C842;color:#F5C842}
.subdesc{font-size:9px;color:rgba(232,213,163,.32);margin-top:4px;letter-spacing:.06em}

/* Child sub-tabs */
.child-tabs{display:none;gap:6px;padding:6px 14px;background:rgba(0,0,0,.6);border-bottom:1px solid rgba(232,213,163,.08)}
.child-tabs.show{display:flex}
.ctab{flex:1;border:1px solid rgba(232,213,163,.2);border-radius:3px;color:rgba(232,213,163,.55);
      font-size:10px;padding:6px;letter-spacing:.04em}
.ctab.on{background:rgba(96,165,250,.12);border-color:#60a5fa;color:#60a5fa}

/* Viewfinder */
.vf{flex:1;position:relative;background:#111;overflow:hidden;min-height:0}
#vid{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;display:block;background:#111}
.mirror{transform:scaleX(-1)}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.82);font-size:10px;padding:6px 16px;border-radius:20px;
      pointer-events:none;white-space:nowrap;letter-spacing:.05em;
      border:1px solid rgba(232,213,163,.14);color:rgba(232,213,163,.85);
      max-width:92%;text-align:center;z-index:3}
#hint.ok{color:#4ade80;border-color:rgba(74,222,128,.4)}
#hint.warn{color:#fb923c;border-color:rgba(251,146,60,.35)}

.flash{position:absolute;inset:0;background:#fff;pointer-events:none;z-index:9;animation:fl .2s forwards}
@keyframes fl{to{opacity:0}}

.proc{position:absolute;inset:0;background:rgba(0,0,0,.92);z-index:20;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center}
.spin{width:36px;height:36px;border:3px solid rgba(245,200,66,.15);border-top-color:#F5C842;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.proc p{color:#E8D5A3;font-size:11px;letter-spacing:.12em}
.proc small{font-size:9px;color:rgba(232,213,163,.4);max-width:280px;line-height:1.5}

.prev-wrap{position:absolute;inset:0;z-index:15;display:flex;align-items:center;justify-content:center;background:#111}
.prev-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.prev-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.8);border:1px solid #4ade80;border-radius:4px;padding:4px 10px;font-size:10px;color:#fff}
.prev-badge.warn{border-color:#fb923c;color:#fb923c}

.cam-err{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px;
         background:rgba(0,0,0,.92);font-size:12px;text-align:center;line-height:1.7;z-index:10;color:rgba(232,213,163,.9)}
.cam-err b{font-size:32px}
.cam-err button{margin-top:8px;padding:10px 24px;background:rgba(245,200,66,.15);border:1px solid #F5C842;border-radius:4px;color:#F5C842;font-size:11px;letter-spacing:.1em}

.tap-start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(0,0,0,.85);z-index:8;cursor:pointer}
.tap-start b{font-size:48px;color:#F5C842}
.tap-start p{color:#E8D5A3;font-size:12px;letter-spacing:.1em}

/* Status bar */
#sbar{flex-shrink:0;display:flex;gap:4px;padding:5px 8px;background:rgba(0,0,0,.5);border-top:1px solid rgba(232,213,163,.08)}
.sp{flex:1;min-width:0;display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:3px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);font-size:8.5px;letter-spacing:.04em}
.sd{width:6px;height:6px;min-width:6px;border-radius:50%}
.st{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Controls */
#ctrl{flex-shrink:0;display:flex;align-items:center;justify-content:space-around;padding:12px 16px;background:#0E0E12;
      border-top:1px solid rgba(232,213,163,.08);gap:10px;flex-wrap:wrap}
.cbtn{width:64px;height:64px;border-radius:50%;border:3px solid #F5C842;background:transparent;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 14px rgba(245,200,66,.14);
      transition:border-color .25s,box-shadow .25s;position:relative}
.cbtn.rdy{border-color:#4ade80;animation:rp 1.6s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 14px rgba(74,222,128,.2)}50%{box-shadow:0 0 30px rgba(74,222,128,.6)}}
.cbtn.child{border-color:#60a5fa}
.ci{width:48px;height:48px;border-radius:50%;background:#F5C842;transition:background .25s;pointer-events:none}
.cbtn.rdy .ci{background:#4ade80}
.cbtn.child .ci{background:#60a5fa}
.cbtn .cn{position:absolute;font-size:10px;color:#0E0E12;font-weight:700;pointer-events:none}
.icobtn{width:42px;height:42px;border-radius:50%;background:rgba(232,213,163,.05);border:1px solid rgba(232,213,163,.2);
        color:#E8D5A3;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.icobtn.on{border-color:#60a5fa;background:rgba(96,165,250,.1)}
.icobtn:disabled{opacity:.3;cursor:not-allowed}
.abtn{flex:1 1 30%;min-width:90px;padding:11px 0;background:transparent;border:1px solid rgba(232,213,163,.25);
      color:#E8D5A3;border-radius:4px;font-size:11px;letter-spacing:.08em;text-align:center}
.abtn.p{background:rgba(245,200,66,.12);border-color:#F5C842;color:#F5C842}
.paper-toggle{display:flex;gap:0;border:1px solid rgba(232,213,163,.2);border-radius:3px;overflow:hidden;align-self:center}
.paper-toggle button{padding:6px 8px;font-size:9px;color:rgba(232,213,163,.6);background:transparent}
.paper-toggle button.on{background:rgba(245,200,66,.18);color:#F5C842}

/* Requirements */
#req{flex-shrink:0;padding:7px 14px 10px;border-top:1px solid rgba(232,213,163,.07);background:rgba(0,0,0,.25)}
#req h4{font-size:8px;letter-spacing:.2em;color:rgba(232,213,163,.28);margin-bottom:5px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.ri{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;border-bottom:1px solid rgba(232,213,163,.06)}
.rk{color:rgba(232,213,163,.35)}.rv{color:rgba(232,213,163,.7);text-align:right}

/* Burst strip */
.bstrip{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.94);z-index:16;padding:14px;border-top:1px solid rgba(232,213,163,.15);
        display:flex;flex-direction:column;gap:10px;max-height:70%;overflow-y:auto}
.bstrip-h{display:flex;justify-content:space-between;align-items:center;font-size:10px;letter-spacing:.1em;color:rgba(232,213,163,.7)}
.bstrip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
.bthumb{aspect-ratio:35/45;border:2px solid rgba(232,213,163,.2);border-radius:3px;overflow:hidden;cursor:pointer;background:#222;position:relative}
.bthumb.ok{border-color:#4ade80}
.bthumb.bad{border-color:rgba(239,68,68,.5);opacity:.45}
.bthumb img{width:100%;height:100%;object-fit:cover}
.bthumb-x{position:absolute;top:2px;right:2px;font-size:9px;color:#ef4444;background:rgba(0,0,0,.6);padding:1px 3px;border-radius:2px}
.bstrip-act{display:flex;gap:6px}
.bstrip-act .abtn{flex:1}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:30;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#161620;border:1px solid rgba(232,213,163,.2);border-radius:6px;padding:18px;max-width:380px;width:100%;
       display:flex;flex-direction:column;gap:12px}
.modal h3{font-size:12px;letter-spacing:.15em;color:#F5C842}
.modal label{font-size:10px;color:rgba(232,213,163,.7);display:flex;flex-direction:column;gap:4px}
.modal input[type=password],.modal input[type=text]{background:#0a0a10;border:1px solid rgba(232,213,163,.25);border-radius:3px;
       padding:8px 10px;color:#E8D5A3;font-size:11px;letter-spacing:.04em}
.modal select{background:#0a0a10;border:1px solid rgba(232,213,163,.25);border-radius:3px;padding:8px 10px;color:#E8D5A3;font-size:11px}
.modal small{font-size:9px;color:rgba(232,213,163,.45);line-height:1.5}
.modal-row{display:flex;gap:8px}
.modal-row .abtn{flex:1}

/* Toast */
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:rgba(0,0,0,.92);border:1px solid rgba(232,213,163,.3);
       border-radius:4px;padding:10px 18px;font-size:11px;color:#E8D5A3;z-index:40;max-width:90%;text-align:center;line-height:1.5;
       animation:tin .2s ease-out}
.toast.warn{border-color:#fb923c;color:#fb923c}
.toast.err{border-color:#ef4444;color:#ef4444}
.toast.ok{border-color:#4ade80;color:#4ade80}
@keyframes tin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

.upload-help{font-size:10px;color:rgba(232,213,163,.55);text-align:center;letter-spacing:.04em;padding:4px 8px}
</style>
</head>
<body>
<div class="app">

  <div class="ad-slot" id="adTop" data-ad-slot="top"></div>

  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-title">⊞ ФОТО НА ДОКУМЕНТЫ РФ</div>
      <button class="hdr-cog" onclick="openSettings()" aria-label="Настройки">⚙</button>
    </div>
    <div class="pills">
      <button class="pill on" onclick="setType('passport')">Паспорт / Загран</button>
      <button class="pill"    onclick="setType('visa')">Виза</button>
      <button class="pill"    onclick="setType('military')">Воен. билет</button>
      <button class="pill"    onclick="toggleChildMode()" id="childPill">👶 Ребёнок</button>
    </div>
    <div class="subdesc" id="subdesc">35×45 мм · Загранпаспорт, ВНЖ, СНИЛС</div>
  </div>

  <div class="child-tabs" id="childTabs">
    <button class="ctab on" onclick="setChildSrc('burst')" id="ctab0">📸 Серия 5×</button>
    <button class="ctab"    onclick="setChildSrc('upload')" id="ctab1">📁 Загрузить 4–12</button>
  </div>

  <div class="vf" id="vf">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="ov"></canvas>
    <div id="hint" class="hint">Запуск…</div>
  </div>

  <div class="ad-slot" id="adMid" data-ad-slot="mid"></div>

  <div id="sbar">
    <div class="sp" id="sp0"><div class="sd" style="background:#555"></div><span class="st" style="color:#555">Поз. лица…</span></div>
    <div class="sp" id="sp1"><div class="sd" style="background:#555"></div><span class="st" style="color:#555">Голова…</span></div>
    <div class="sp" id="sp2"><div class="sd" style="background:#555"></div><span class="st" style="color:#555">Свет…</span></div>
  </div>

  <div id="ctrl"></div>

  <div id="req">
    <h4>ТРЕБОВАНИЯ ГОСТ Р 70997-2023</h4>
    <div class="rg" id="rg"></div>
  </div>
</div>

<input type="file" id="fileSingle" accept="image/*" hidden>
<input type="file" id="fileMulti"  accept="image/*" multiple hidden>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   Constants and configuration
═══════════════════════════════════════════════════════ */

const TYPES = {
  passport: { label:'Паспорт / Загран', size:'35×45 мм', aspect:35/45, desc:'Загранпаспорт, ВНЖ, СНИЛС',
              wMM:35, hMM:45, headPctMin:.70, headPctMax:.80, eyeFromBottomMin:.56, eyeFromBottomMax:.70 },
  visa:     { label:'Виза',             size:'35×45 мм', aspect:35/45, desc:'Шенген, US, UK, Китай',
              wMM:35, hMM:45, headPctMin:.70, headPctMax:.80, eyeFromBottomMin:.56, eyeFromBottomMax:.70 },
  military: { label:'Воен. билет',      size:'30×40 мм', aspect:30/40, desc:'Военный билет, приписное',
              wMM:30, hMM:40, headPctMin:.70, headPctMax:.80, eyeFromBottomMin:.55, eyeFromBottomMax:.68 },
};

const BURST_COUNT = 5;
const UPLOAD_MIN = 4, UPLOAD_MAX = 12, UPLOAD_RECOMMENDED = 8;
const TOLERANCE = { burst: 0.05, upload: 0.08 };  // ±5% / ±8% deviation in face metrics
const AGE_TOLERANCE_YEARS = 2;
const TARGET_DPI = 300;

/* ═══════════════════════════════════════════════════════
   Platform adapter — keep DOM/web specifics isolated so
   that an Android (Capacitor/WebView) port can swap this
   layer for native bridges without touching app logic.
═══════════════════════════════════════════════════════ */

const Platform = {
  isWeb: true,
  isAndroid: typeof window !== 'undefined' && !!window.AndroidBridge,  // future native bridge
  secureContext: () => typeof window !== 'undefined' && window.isSecureContext,
  storage: {
    get: (k) => { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set: (k,v) => { try { localStorage.setItem(k,v); } catch(e) {} },
  },
  share: async (blob, name) => {
    if (navigator.share && navigator.canShare?.({files:[new File([blob], name)]})) {
      return navigator.share({ files:[new File([blob], name, {type:blob.type})], title:'Фото на документы' });
    }
    return false;
  },
  // print() opens a new window with HTML and triggers the print dialog;
  // on Android this would be replaced by Capacitor PrintPlugin / Printing.print()
  print: (html) => {
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const win = window.open(url, '_blank');
    if (!win) {
      // popup blocked — use overlay iframe fallback
      const ifr = document.createElement('iframe');
      ifr.style.cssText='position:fixed;inset:0;width:100vw;height:100vh;border:0;z-index:50;background:#fff';
      ifr.src = url;
      document.body.appendChild(ifr);
      ifr.onload = () => setTimeout(() => {
        try { ifr.contentWindow.print(); } catch(e) {}
        setTimeout(() => { ifr.remove(); URL.revokeObjectURL(url); }, 1000);
      }, 200);
    } else {
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    }
  },
};

/* ═══════════════════════════════════════════════════════
   Log — ring buffer in localStorage so the user (and we)
   can diagnose "не работает" cases. Capped at 200 entries.
═══════════════════════════════════════════════════════ */

const Log = (() => {
  const KEY = 'log';
  const MAX = 200;
  let mem = [];
  try { mem = JSON.parse(Platform.storage.get(KEY) || '[]'); } catch(e) { mem = []; }
  const flush = () => Platform.storage.set(KEY, JSON.stringify(mem.slice(-MAX)));
  const push = (level, args) => {
    const msg = args.map(a => a instanceof Error ? (a.message + ' @ ' + (a.stack||'').split('\n')[1]) :
                              typeof a === 'object' ? safeStringify(a) : String(a)).join(' ');
    const entry = { t: Date.now(), l: level, m: msg.slice(0, 500) };
    mem.push(entry);
    if (mem.length > MAX) mem.splice(0, mem.length - MAX);
    flush();
    const fn = console[level] || console.log;
    fn(`[${level}]`, ...args);
  };
  return {
    info:  (...a) => push('info',  a),
    warn:  (...a) => push('warn',  a),
    error: (...a) => push('error', a),
    debug: (...a) => push('debug', a),
    get all() { return mem.slice(); },
    clear() { mem = []; flush(); },
    export() {
      const lines = mem.map(e => `[${new Date(e.t).toISOString()}] ${e.l.toUpperCase()} ${e.m}`).join('\n');
      const blob = new Blob([lines], { type:'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `photo_app_log_${Date.now()}.txt`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    },
  };
})();

function safeStringify(o) { try { return JSON.stringify(o).slice(0,300); } catch(e) { return '[unserializable]'; } }

window.addEventListener('error', e => Log.error('window.error:', e.message, '@', e.filename + ':' + e.lineno));
window.addEventListener('unhandledrejection', e => Log.error('unhandledrejection:', e.reason?.message || e.reason));

Log.info('App boot. UA=', navigator.userAgent.slice(0,80), 'secure=', Platform.secureContext());

/* ═══════════════════════════════════════════════════════
   Backup — last N finalized photos kept in IndexedDB so
   the user can recover after an accidental reload or
   navigation. We also keep the last burst so AI compose
   can be retried without re-shooting.
═══════════════════════════════════════════════════════ */

const Backup = (() => {
  const DB = 'photoApp', STORE = 'shots', MAX_FINALS = 5;
  function open() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath:'id' });
      };
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    });
  }
  async function put(id, payload) {
    try {
      const db = await open();
      await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put({ id, t: Date.now(), ...payload });
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
      Log.debug('Backup put', id);
    } catch (e) { Log.warn('Backup put failed:', e.message); }
  }
  async function get(id) {
    try {
      const db = await open();
      return await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readonly');
        const rq = tx.objectStore(STORE).get(id);
        rq.onsuccess = () => res(rq.result || null);
        rq.onerror   = () => rej(rq.error);
      });
    } catch (e) { Log.warn('Backup get failed:', e.message); return null; }
  }
  async function list() {
    try {
      const db = await open();
      return await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readonly');
        const rq = tx.objectStore(STORE).getAll();
        rq.onsuccess = () => res(rq.result || []);
        rq.onerror   = () => rej(rq.error);
      });
    } catch (e) { return []; }
  }
  async function trimFinals() {
    const all = await list();
    const finals = all.filter(x => x.id.startsWith('final:')).sort((a,b) => b.t - a.t);
    if (finals.length <= MAX_FINALS) return;
    const db = await open();
    for (const e of finals.slice(MAX_FINALS)) {
      await new Promise((res) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(e.id);
        tx.oncomplete = res; tx.onerror = res;
      });
    }
  }
  return {
    saveBurst: (shots) => put('burst:last', { shots }),
    loadBurst: () => get('burst:last').then(x => x?.shots || []),
    saveFinal: async (url, meta) => { await put('final:' + Date.now(), { url, meta }); trimFinals(); },
    listFinals: async () => (await list()).filter(x => x.id.startsWith('final:')).sort((a,b) => b.t - a.t),
    clear: async () => {
      try { const db = await open();
        await new Promise(res => { const tx = db.transaction(STORE,'readwrite'); tx.objectStore(STORE).clear(); tx.oncomplete = res; tx.onerror = res; });
      } catch(e) {}
    },
  };
})();

/* ═══════════════════════════════════════════════════════
   AI backend abstraction — current direct Gemini path;
   Telegram bot proxy is stubbed for future implementation.
═══════════════════════════════════════════════════════ */

// Gemini API возвращает inlineData/mimeType (camelCase) на части эндпоинтов
// и inline_data/mime_type (snake_case) на других. Принимаем оба варианта.
function pickInlineData(j) {
  const parts = j?.candidates?.[0]?.content?.parts;
  if (!parts) return null;
  for (const p of parts) {
    const d = p.inline_data || p.inlineData;
    if (d && d.data) return d;
  }
  return null;
}

class GeminiDirectBackend {
  constructor(key) { this.key = key; }
  get configured() { return !!this.key; }

  // Релакс safety-фильтра до BLOCK_NONE. Для задачи «document photo» все
  // категории не релевантны — мы только редактируем фон/позу. Дефолтные
  // BLOCK_MEDIUM_AND_ABOVE слишком жёсткие и блокируют адекватные фото лиц.
  _safetySettings() {
    return [
      'HARM_CATEGORY_HARASSMENT', 'HARM_CATEGORY_HATE_SPEECH',
      'HARM_CATEGORY_SEXUALLY_EXPLICIT', 'HARM_CATEGORY_DANGEROUS_CONTENT',
      'HARM_CATEGORY_CIVIC_INTEGRITY'
    ].map(category => ({ category, threshold: 'BLOCK_NONE' }));
  }

  // Расшифровка ответа Gemini, когда inline_data отсутствует.
  // Часто это safety-блок: для фото с детьми/несколькими лицами политика жёстче.
  // STOP без картинки = модель ответила текстом (нужно посмотреть что она сказала).
  _explainNoImage(j, context) {
    const block = j?.promptFeedback?.blockReason || j?.candidates?.[0]?.finishReason;
    const ratings = j?.promptFeedback?.safetyRatings || j?.candidates?.[0]?.safetyRatings || [];
    const highCats = ratings.filter(r => r.probability && r.probability !== 'NEGLIGIBLE' && r.probability !== 'LOW')
                            .map(r => r.category?.replace('HARM_CATEGORY_','')).join(', ');
    // Текстовый ответ модели (может объяснять, почему она не сгенерировала картинку)
    const textParts = j?.candidates?.[0]?.content?.parts?.filter(p => p.text).map(p => p.text).join(' ').trim();
    const textHint = textParts ? ` Модель ответила текстом: «${textParts.slice(0,180)}${textParts.length>180?'…':''}»` : '';

    if (block === 'SAFETY' || block === 'IMAGE_SAFETY' || /safety/i.test(String(block||''))) {
      const childHint = context === 'replaceBg'
        ? ' На фото с детьми лучше работает режим «👶 Ребёнок» (серия 5 кадров или загрузка 4–12 фото) — у него промпт под document-photo, проходит фильтр чаще.'
        : '';
      return `Gemini заблокировал по политике безопасности (${block}${highCats?', '+highCats:''}).${childHint}${textHint}`;
    }
    if (block === 'RECITATION') return 'Gemini отклонил: повтор обучающих данных.' + textHint;
    if (block === 'PROHIBITED_CONTENT') return 'Gemini отклонил: запрещённый контент.' + textHint;
    if (block === 'IMAGE_OTHER' || block === 'IMAGE_PROHIBITED' || block === 'IMAGE_RECITATION') {
      const fm = j?.candidates?.[0]?.finishMessage || '';
      const hint = /rephras/i.test(fm)
        ? 'промпт неоднозначный для этой картинки. Попробуйте «🔁 AI ещё попытка» — каждая попытка идёт через рандом, часто помогает.'
        : (fm || 'модель отказалась генерить.');
      return `Gemini не смог сгенерировать изображение (${block}): ${hint}`;
    }
    if (block === 'STOP') {
      // Модель «нормально» закончила, но вместо картинки вернула текст — модель отказывается или не поняла промпт.
      return 'Gemini вернул только текст вместо изображения.' + textHint +
             (context === 'replaceBg' ? ' Попробуйте режим «👶 Ребёнок» или другой кадр.' : '');
    }
    if (block) return `Gemini не вернул изображение (${block}).` + textHint;
    return 'Gemini не вернул изображение. Попробуйте другой кадр.' + textHint;
  }

  async compose(images, refMetrics, childSrc) {
    if (!this.configured) throw new Error('Не задан API-ключ Gemini');
    const refTxt = refMetrics
      ? `Reference proportions to preserve: interocular distance ≈ ${refMetrics.iod.toFixed(3)}× bbox width, eye-to-chin ≈ ${refMetrics.e2c.toFixed(3)}× bbox height, nose-to-mouth ≈ ${refMetrics.n2m.toFixed(3)}× bbox height.`
      : '';
    const srcTxt = childSrc === 'upload'
      ? 'These photos were taken at different times/places — clothing, lighting and background may vary. Identify the consistent facial geometry across them and ignore clothing/background. '
      : 'These are a 5-shot burst taken seconds apart under the same lighting. ';
    const prompt =
      'You are generating an ID document photo for a Russian passport (35×45 mm). ' +
      'Compose a single fronto-parallel portrait from the provided photos of the SAME child. ' +
      srcTxt +
      'STRICT REQUIREMENTS: ' +
      '1) Face directly toward camera, eyes open, mouth closed, neutral expression. ' +
      '2) PRESERVE FACIAL GEOMETRY EXACTLY: do not change interocular distance, nose length, chin width, eye shape, ear position, head proportions. These must match the input photos within 5%. ' +
      '3) Plain white/light-gray background, even soft lighting, no shadows on face or background. ' +
      '4) Hair, skin tone, freckles, birthmarks, eyebrows and eyelashes must be preserved as in the originals. ' +
      '5) Head occupies 70–80% of frame height, eyes at 56–70% from bottom. ' +
      '6) Output aspect ratio 35:45 (portrait). ' +
      '7) Do not change the apparent age of the child. ' +
      refTxt;
    const parts = [
      { text: prompt },
      ...images.map(img => ({ inline_data:{ mime_type:'image/jpeg', data: img.dataUrl.split(',')[1] } }))
    ];
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${encodeURIComponent(this.key)}`;
    const r = await fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{ parts }],
        safetySettings: this._safetySettings(),
        generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
      })
    });
    if (r.status === 429) {
      throw new Error('Лимит Gemini исчерпан. Бесплатный тариф даёт ~10 генераций изображений в день. ' +
        'Подождите минуту или подключите биллинг: ai.google.dev → API key → Enable billing.');
    }
    if (!r.ok) {
      const t = await r.text();
      throw new Error(`Gemini ${r.status}: ${t.slice(0,200)}`);
    }
    const j = await r.json();
    try { Log.info('compose raw response:', JSON.stringify(j).slice(0, 2000)); } catch(_) {}
    const out = pickInlineData(j);
    if (!out) throw new Error(this._explainNoImage(j, 'compose'));
    return 'data:' + (out.mime_type || out.mimeType) + ';base64,' + out.data;
  }

  async replaceBg(dataUrl) {
    if (!this.configured) throw new Error('Не задан API-ключ Gemini');
    const prompt =
      'OUTPUT: return ONE edited image (not text). ' +
      'This is a portrait already framed for a Russian ID document (35×45 mm). ' +
      'KEEP the existing framing, aspect ratio, and head position. ' +
      'TASKS: ' +
      '1) Replace the background with uniform plain WHITE (#FFFFFF). ' +
      '   Remove every original element from behind the person. ' +
      '2) Apply soft, MATTE, evenly-diffused frontal studio lighting. ' +
      '   No specular highlights or shiny spots on forehead/nose/cheeks. ' +
      '   No directional shadows under nose, chin, or on neck. ' +
      '3) Shoulders horizontal and level. No raised arm, no twisted torso. ' +
      '4) Mouth closed in a relaxed neutral expression: lips touching, no teeth, no smile. ' +
      '5) Subtle professional retouch: under-eye darkness ~50% less, fine wrinkles ~30% less, ' +
      '   even skin tone. KEEP pores, beard, moles, freckles, scars, glasses. ' +
      '   No airbrushed / plastic / CGI look — must read as a real un-edited camera photo. ' +
      'KEEP UNCHANGED: face geometry, hair color/style, clothing color/material, apparent age.';
    // Specialised image-generation model; native image output.
    // Try preview name first (older, often more permissive), fall back to prod name if 404.
    const candidateModels = ['gemini-2.5-flash-image-preview', 'gemini-2.5-flash-image'];
    let r;
    for (let i = 0; i < candidateModels.length; i++) {
      const model = candidateModels[i];
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(this.key)}`;
      Log.info(`replaceBg attempt ${i+1}/${candidateModels.length}, model=${model}`);
      r = await fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          contents:[{ parts:[
            { text: prompt },
            { inline_data:{ mime_type:'image/jpeg', data: dataUrl.split(',')[1] } }
          ]}],
          safetySettings: this._safetySettings()
        })
      });
      if (r.status === 404) { Log.warn(`model ${model} not found, trying next`); continue; }
      break;
    }
    if (r.status === 429) {
      throw new Error('Лимит Gemini исчерпан. Бесплатный тариф даёт ~10 генераций изображений в день. ' +
        'Подождите минуту или подключите биллинг: ai.google.dev → API key → Enable billing.');
    }
    if (!r.ok) { const t = await r.text(); throw new Error(`Gemini ${r.status}: ${t.slice(0,200)}`); }
    const j = await r.json();
    try { Log.info('replaceBg raw response:', JSON.stringify(j).slice(0, 2000)); } catch(_) {}
    const out = pickInlineData(j);
    if (!out) throw new Error(this._explainNoImage(j, 'replaceBg'));
    return 'data:' + (out.mime_type || out.mimeType) + ';base64,' + out.data;
  }

  async estimateAge(dataUrl) {
    if (!this.configured) throw new Error('Не задан API-ключ Gemini');
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(this.key)}`;
    const r = await fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        contents:[{ parts:[
          { text:'What is the approximate age in years of the person in this photo? Respond with a single integer number only, no other text.' },
          { inline_data:{ mime_type:'image/jpeg', data: dataUrl.split(',')[1] } }
        ]}],
        generationConfig:{ temperature:0, maxOutputTokens:8 }
      })
    });
    if (!r.ok) return null;
    const j = await r.json();
    const txt = j.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const n = parseInt(txt.match(/\d+/)?.[0] || '', 10);
    return Number.isFinite(n) ? n : null;
  }
}

async function startCamera() {
  if (!Platform.secureContext()) { showCamError({ name:'InsecureContext' }); return; }
  gVideoReady = false;
  if (gStream) { gStream.getTracks().forEach(t => t.stop()); gStream = null; }
  clearTimeout(gPollTimer);
  cancelAnimationFrame(gRaf);
  clearTimeout(gAnalyzeTimer);

  vfEl.querySelectorAll('.cam-err,.tap-start').forEach(e => e.remove());
  vid.srcObject = null;
  vid.className = gFacing === 'user' ? 'mirror' : '';
  setHint('Запуск камеры…');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:gFacing, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
  } catch (e1) {
    console.warn('getUserMedia ideal failed:', e1.name);
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
    } catch (e2) {
      showCamError(e2);
      return;
    }
  }

  gStream = stream;
  vid.srcObject = stream;

  detectPortraitCapability(stream);

  const onReady = () => { if (!gVideoReady) onVideoReady(); };
  vid.addEventListener('loadedmetadata', onReady, { once:true });
  vid.addEventListener('canplay',        onReady, { once:true });
  vid.addEventListener('playing',        onReady, { once:true });

  let pollCount = 0;
  const poll = () => {
    if (gVideoReady) return;
    if (vid.videoWidth > 0) { onVideoReady(); return; }
    if (++pollCount < 40) gPollTimer = setTimeout(poll, 200);
    else showTapToStart();   // 8s with no signal — likely autoplay blocked
  };
  gPollTimer = setTimeout(poll, 500);

  try {
    await vid.play();
  } catch (e) {
    console.warn('play() rejected:', e?.name || e);
    if (e?.name === 'NotAllowedError') showTapToStart();
  }
}

function onVideoReady() {
  if (gVideoReady) return;
  gVideoReady = true;
  clearTimeout(gPollTimer);
  setHint(gMode === 'child' ? 'Готовы снять серию' : 'Совместите лицо с овалом');
  startOverlay();
  scheduleAnalysis(800);
}

function showCamError(err) {
  clearTimeout(gPollTimer);
  let msg = 'Нет доступа к камере.';
  if (err.name === 'InsecureContext') msg = 'Откройте приложение по HTTPS (или localhost). По <code>file://</code> браузер не выдаёт доступ к камере.\n\nПодсказка: <code>python3 -m http.server</code>';
  else if (err.name === 'NotAllowedError') msg = 'Доступ к камере запрещён.\nНастройки → Сайт → Камера → Разрешить.';
  else if (err.name === 'NotFoundError') msg = 'Камера не найдена на устройстве.';
  else if (err.name === 'NotReadableError') msg = 'Камера занята другим приложением.';
  else msg = `${err.name||'Error'}: ${err.message||err}`;
  vfEl.querySelectorAll('.cam-err,.tap-start').forEach(e => e.remove());
  const div = document.createElement('div');
  div.className = 'cam-err';
  div.innerHTML = `<b>📷</b><div>${msg.replace(/\n/g,'<br>')}</div>` +
    (err.name === 'InsecureContext'
      ? ''
      : `<button onclick="startCamera()">Повторить</button>`);
  vfEl.appendChild(div);
}

function showTapToStart() {
  clearTimeout(gPollTimer);
  if (vfEl.querySelector('.tap-start')) return;
  const div = document.createElement('div');
  div.className = 'tap-start';
  div.innerHTML = `<b>▶</b><p>Нажмите для запуска камеры</p>`;
  div.onclick = () => { div.remove(); startCamera(); };
  vfEl.appendChild(div);
}

async function detectPortraitCapability(stream) {
  gPortraitCapable = false;
  try {
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities?.() || {};
    if ('backgroundBlur' in caps || 'backgroundSegmentationMask' in caps) {
      gPortraitCapable = true;
      renderCtrl();
    }
  } catch (e) { /* silent */ }
}

async function togglePortrait() {
  if (!gStream || !gPortraitCapable) return;
  gPortrait = !gPortrait;
  try {
    const track = gStream.getVideoTracks()[0];
    const caps = track.getCapabilities?.() || {};
    const c = {};
    if ('backgroundBlur' in caps) c.backgroundBlur = gPortrait;
    else if ('backgroundSegmentationMask' in caps) c.backgroundSegmentationMask = gPortrait;
    await track.applyConstraints({ advanced:[c] });
    renderCtrl();
  } catch (e) {
    toast('Портретный режим не применился: ' + (e.message||e), 'warn');
    gPortrait = false; renderCtrl();
  }
}

   Overlay loop
═══════════════════════════════════════════════════════ */

function startOverlay() {
  cancelAnimationFrame(gRaf);
  const loop = () => {
    if (gCaptured) return;
    const W=vfEl.clientWidth, H=vfEl.clientHeight;
    if (ov.width!==W || ov.height!==H) { ov.width=W; ov.height=H; }
    octx.clearRect(0,0,W,H);
    drawGuides(W,H);
    gRaf = requestAnimationFrame(loop);
  };
  gRaf = requestAnimationFrame(loop);
}

/* Real video bounds inside viewfinder when using object-fit:contain.
   Letterboxed/pillarboxed depending on video vs viewfinder aspect ratio. */
function getVideoBounds(W, H) {
  const vw = vid.videoWidth, vh = vid.videoHeight;
  if (!vw || !vh) return { x:0, y:0, w:W, h:H };
  const vAsp = vw/vh, fAsp = W/H;
  if (vAsp > fAsp) {                    // video wider → letterbox top/bottom
    const h = W / vAsp;
    return { x:0, y:(H-h)/2|0, w:W, h:h|0 };
  } else {                              // video taller → pillarbox sides
    const w = H * vAsp;
    return { x:(W-w)/2|0, y:0, w:w|0, h:H };
  }
}

function drawGuides(W, H) {
  const t = TYPES[gType];
  const vb = getVideoBounds(W, H);
  // crop frame fits inside visible video area
  let fH = vb.h*.83, fW = fH * t.aspect;
  if (fW > vb.w*.78) { fW = vb.w*.78; fH = fW / t.aspect; }
  const fX = (vb.x + (vb.w-fW)/2) | 0, fY = (vb.y + (vb.h-fH)/2) | 0;

  octx.fillStyle = 'rgba(0,0,0,.52)';
  // dim everything outside the crop frame — including letterbox bars
  octx.fillRect(0,0,W,fY);
  octx.fillRect(0,fY+fH,W,H-fY-fH);
  octx.fillRect(0,fY,fX,fH);
  octx.fillRect(fX+fW,fY,W-fX-fW,fH);

  const allOk = gFs==='ok' && (gHs==='ok'||gHs==='na');
  const anyWarn = gFs!=='ok' && gFs!=='init' && gFs!=='na';
  const cc = allOk ? '#4ade80' : '#F5C842';
  const oc = allOk ? 'rgba(74,222,128,.85)' : anyWarn ? 'rgba(249,115,22,.8)' : 'rgba(245,200,66,.55)';

  octx.strokeStyle='rgba(232,213,163,.45)'; octx.lineWidth=1.5; octx.setLineDash([]);
  octx.strokeRect(fX,fY,fW,fH);

  const L = Math.min(fW,fH)*.1 | 0;
  octx.strokeStyle = cc; octx.lineWidth = 3; octx.lineCap = 'round';
  [[fX,fY,1,1],[fX+fW,fY,-1,1],[fX,fY+fH,1,-1],[fX+fW,fY+fH,-1,-1]].forEach(([x,y,dx,dy])=>{
    octx.beginPath(); octx.moveTo(x+dx*L,y); octx.lineTo(x,y); octx.lineTo(x,y+dy*L); octx.stroke();
  });

  // Per-type ratios — derive oval/eye/chin from physical specs
  const ovalH = (t.headPctMin + t.headPctMax)/2;                     // ≈0.75
  const eyeY = 1 - (t.eyeFromBottomMin + t.eyeFromBottomMax)/2;      // from top
  const ovalCY = eyeY + (.85 - eyeY)*.25;                            // visual center between eyes and chin
  // Face width/height ratio ≈ 0.75. ovalH is fraction of fH, ovalW is fraction of fW.
  // pixel ovalW = 0.75 * pixel ovalH ⇒ ovalW = 0.75 * ovalH * fH / fW = 0.75 * ovalH / aspect
  const ovalW = Math.min(0.92, 0.75 * ovalH / t.aspect);

  octx.strokeStyle = oc; octx.lineWidth = 2; octx.setLineDash([6,4]);
  octx.beginPath();
  octx.ellipse(fX+fW/2, fY+fH*ovalCY, fW*ovalW/2, fH*ovalH/2, 0, 0, Math.PI*2);
  octx.stroke(); octx.setLineDash([]);

  const eY = fY + fH*eyeY, crY = fY + fH*.11, chY = fY + fH*.85;
  octx.lineWidth = 1; octx.setLineDash([4,6]);
  octx.strokeStyle='rgba(245,200,66,.3)';
  octx.beginPath(); octx.moveTo(fX+fW*.28,crY); octx.lineTo(fX+fW*.72,crY); octx.stroke();
  octx.beginPath(); octx.moveTo(fX+fW*.28,chY); octx.lineTo(fX+fW*.72,chY); octx.stroke();
  octx.strokeStyle='rgba(100,200,255,.3)';
  octx.beginPath(); octx.moveTo(fX+fW*.18,eY); octx.lineTo(fX+fW*.82,eY); octx.stroke();
  octx.setLineDash([]);

  if (W-(fX+fW) > 36) {
    const lb = fX+fW+8;
    octx.font='10px monospace';
    octx.fillStyle='rgba(245,200,66,.6)';
    octx.fillText('темя', lb, crY+4); octx.fillText('подб.', lb, chY+4);
    octx.fillStyle='rgba(100,200,255,.6)'; octx.fillText('глаза', lb, eY+4);
  }
  octx.font = Math.max(11, fW*.055 | 0) + 'px monospace';
  octx.fillStyle='rgba(232,213,163,.65)'; octx.textAlign='center';
  octx.fillText(t.size, fX+fW/2, fY-7);
  octx.textAlign='left';

  // Большие визуальные подсказки поверх рамки — стрелки/иконки направления
  drawGuidanceCue(fX, fY, fW, fH);
}

/* Рисуем крупную визуальную подсказку (стрелка/символ) поверх кропа,
   чтобы пользователю не пришлось «гадать» по мелкому тексту хинта. */
function drawGuidanceCue(fX, fY, fW, fH) {
  // приоритет: если есть проблема с позицией, показываем её; иначе — голова; иначе — свет
  let cue = null;
  if (gFs === 'far')         cue = { sym:'+', label:'БЛИЖЕ' };
  else if (gFs === 'close')  cue = { sym:'−', label:'ДАЛЬШЕ' };
  else if (gFs === 'center') cue = { sym:'⊕', label:'В ЦЕНТР' };
  else if (gFs === 'none')   cue = { sym:'👤', label:'ВСТАНЬТЕ В КАДР' };
  else if (gHs === 'tilt_l') cue = { sym:'↻', label:'НАКЛОН ВПРАВО' };
  else if (gHs === 'tilt_r') cue = { sym:'↺', label:'НАКЛОН ВЛЕВО' };
  else if (gHs === 'turn_l') cue = { sym:'→', label:'ПОВЕРНИТЕСЬ' };
  else if (gHs === 'turn_r') cue = { sym:'←', label:'ПОВЕРНИТЕСЬ' };
  else if (gHs === 'up')     cue = { sym:'↓', label:'ПОДБОРОДОК ВНИЗ' };
  else if (gHs === 'down')   cue = { sym:'↑', label:'ПОДБОРОДОК ВВЕРХ' };
  else if (gLs === 'dark')   cue = { sym:'☀', label:'НУЖНО СВЕТЛЕЕ' };
  else if (gLs === 'bright') cue = { sym:'☼', label:'СЛИШКОМ ЯРКО' };
  else if (gLs === 'uneven') cue = { sym:'⇆', label:'СВЕТ С ДВУХ СТОРОН' };
  if (!cue) return;

  // Большой символ слева от лица (или справа, если левый край узкий)
  const symSize = Math.max(36, fW*0.18 | 0);
  octx.save();
  octx.font = `bold ${symSize}px sans-serif`;
  octx.textAlign = 'center';
  octx.textBaseline = 'middle';
  octx.fillStyle = 'rgba(249, 115, 22, 0.95)';
  octx.shadowColor = 'rgba(0,0,0,.7)';
  octx.shadowBlur = 8;
  const cx = fX + fW/2;
  const cy = fY + fH*0.5;
  octx.fillText(cue.sym, cx, cy);
  // Подпись под символом
  octx.font = `bold ${Math.max(10, fW*.045|0)}px sans-serif`;
  octx.fillStyle = 'rgba(249, 115, 22, 1)';
  octx.shadowBlur = 6;
  octx.fillText(cue.label, cx, cy + symSize*0.6);
  octx.restore();
}

/* ═══════════════════════════════════════════════════════
   Analysis (face detection + lighting)
═══════════════════════════════════════════════════════ */

function scheduleAnalysis(d) { clearTimeout(gAnalyzeTimer); gAnalyzeTimer = setTimeout(runAnalysis, d||700); }

async function runAnalysis() {
  if (gCaptured || !vid.videoWidth) { scheduleAnalysis(500); return; }

  try {
    const W2=64, H2=48, t=document.createElement('canvas');
    t.width=W2; t.height=H2;
    const tc=t.getContext('2d');
    tc.drawImage(vid, vid.videoWidth*.25, vid.videoHeight*.15, vid.videoWidth*.5, vid.videoHeight*.7, 0, 0, W2, H2);
    const d = tc.getImageData(0,0,W2,H2).data;
    let s=0, l=0, r=0;
    for (let i=0; i<W2*H2; i++) {
      const b = .299*d[i*4] + .587*d[i*4+1] + .114*d[i*4+2];
      s += b;
      if (i%W2 < W2/2) l += b; else r += b;
    }
    const avg = s/(W2*H2), ev = avg>0 ? Math.abs(l-r)/(avg*W2*H2) : 0;
    gLs = avg<72 ? 'dark' : avg>228 ? 'bright' : ev>.30 ? 'uneven' : 'ok';
  } catch (e) { gLs = 'ok'; }

  if (gModelReady && window._fd) {
    try { await window._fd.send({ image:vid }); }
    catch (e) { gFs='na'; gHs='na'; }
  } else if (!gModelReady && gFs === 'init') {
    gFs='na'; gHs='na';
  }

  updateStatus();
  scheduleAnalysis(700);
}

let _fdLiveHandler = null;  // saved reference so static measurement can restore it

function loadFaceModel() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js';
  s.onload = () => {
    try {
      const fd = new FaceDetection({ locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/' + f });
      fd.setOptions({ model:'short', minDetectionConfidence:0.5 });
      _fdLiveHandler = r => {
        if (gCaptured) return;
        if (!r.detections || !r.detections.length) { gFs='none'; gHs='na'; updateStatus(); return; }
        const det = r.detections[0], bb = det.boundingBox, lm = det.landmarks;
        const cx = bb.xCenter, cy = bb.yCenter, nh = bb.height, nw = bb.width;
        gFs = nh<.28 ? 'far' : nh>.84 ? 'close'
              : (Math.abs(cx-.5)>.16 || Math.abs(cy-.47)>.17) ? 'center' : 'ok';
        if (lm && lm.length >= 4) {
          const re=lm[0], le=lm[1], nose=lm[2], mouth=lm[3];
          const roll = Math.atan2(le.y-re.y, le.x-re.x)*180/Math.PI;
          const yaw  = (nose.x - (re.x+le.x)/2)/nw;
          const e2n  = (nose.y - (re.y+le.y)/2)/nh;
          const n2m  = (mouth.y - nose.y)/nh;
          gHs = roll>9 ? 'tilt_r' : roll<-9 ? 'tilt_l'
              : yaw>.09 ? 'turn_r' : yaw<-.09 ? 'turn_l'
              : (e2n<.18 || n2m>.42) ? 'up' : (e2n>.44 || n2m<.10) ? 'down' : 'ok';
        } else gHs='na';
        updateStatus();
      };
      fd.onResults(_fdLiveHandler);
      window._fd = fd;
      gModelReady = true;
      Log.info('MediaPipe FaceDetection ready');
    } catch (e) {
      Log.error('FD init failed:', e);
      setHint('Детектор лица не загрузился — продолжайте вручную', 'warn');
    }
  };
  s.onerror = () => {
    Log.error('FD load failed (CDN blocked?)');
    setHint('Детектор лица не загрузился (CDN заблокирован?). Продолжайте вручную.', 'warn');
    gFs='na'; gHs='na'; updateStatus();
  };
  document.head.appendChild(s);
}

═══════════════════════════════════════════════════════ */

const PCFG = {

function setPill(id, kind, st) {

}

function isReady() { return gFs==='ok' && (gHs==='ok'||gHs==='na') && gLs==='ok'; }

function setHint(txt, cls) { hintEl.textContent = txt; hintEl.className = 'hint' + (cls ? ' '+cls : ''); }

function updateStatus() {
  setPill('sp0','face',gFs); setPill('sp1','head',gHs); setPill('sp2','light',gLs);
  const f=gFs, h=gHs, l=gLs;
  if      (f==='init')   setHint('Инициализация…');
  else if (f==='none')   setHint('Встаньте перед камерой','warn');
  else if (f==='close')  setHint('Отойдите дальше','warn');
  else if (f==='far')    setHint('Подойдите ближе','warn');
  else if (f==='center') setHint('Выровняйте лицо','warn');
  else if (h==='tilt_l') setHint('Наклоните голову вправо','warn');
  else if (h==='tilt_r') setHint('Наклоните голову влево','warn');
  else if (h==='turn_l') setHint('Повернитесь правее','warn');
  else if (h==='turn_r') setHint('Повернитесь левее','warn');
  else if (h==='up')     setHint('Опустите подбородок','warn');
  else if (h==='down')   setHint('Поднимите подбородок','warn');
  else if (l==='dark')   setHint('Добавьте освещения','warn');
  else if (l==='bright') setHint('Уменьшите яркость','warn');
  else if (l==='uneven') setHint('Нужен свет с двух сторон','warn');
  else if (isReady())    setHint(gMode==='child' ? 'Готово — нажмите «Серия»' : '✓ Готово — нажмите кнопку','ok');
  else                   setHint('Совместите лицо с овалом');

  const capBtn = document.getElementById('capBtn');
  if (capBtn) capBtn.className = 'cbtn' + (gMode==='child' ? ' child' : isReady() ? ' rdy' : '');

/* ═══════════════════════════════════════════════════════
   Single-photo capture (existing flow)
═══════════════════════════════════════════════════════ */

async function doCapture() {
  if (gMode === 'child') {
    if (gChildSrc === 'burst') return captureBurst();
    return fileMulti.click();
  }
  if (!vid.videoWidth) return;
  gCaptured = true;
  cancelAnimationFrame(gRaf); clearTimeout(gAnalyzeTimer);

  const fl = document.createElement('div'); fl.className = 'flash';
  vfEl.appendChild(fl); setTimeout(() => fl.remove(), 280);

  const po = showProcessing(gBgRemove ? 'удаление фона · коррекция света' : 'коррекция света');
  await new Promise(r => setTimeout(r, 80));

  const { aspect } = TYPES[gType];
  const vw = vid.videoWidth, vh = vid.videoHeight;
  let cW, cH;
  if (vw/vh > aspect) { cH = vh; cW = (vh*aspect)|0; }
  else                { cW = vw; cH = (vw/aspect)|0; }
  const sx = ((vw-cW)/2)|0, sy = ((vh-cH)/2)|0;
  capCv.width = cW; capCv.height = cH;
  if (gFacing === 'user') {
    capCtx.save(); capCtx.translate(cW,0); capCtx.scale(-1,1);
    capCtx.drawImage(vid, sx, sy, cW, cH, 0, 0, cW, cH); capCtx.restore();
  } else {
    capCtx.drawImage(vid, sx, sy, cW, cH, 0, 0, cW, cH);
  }

  po.step('Постобработка');
  po.substep('масштабируем до 300 DPI, мягкая коррекция света');
  po.progress(0.4);
  // Flood-fill отключён по умолчанию — даёт артефакты на сложном фоне.
  // Для удаления фона пользователь нажимает «🪄 AI фон» в preview.
  let url = await finalizeCapturedCanvas(capCv, { skipBgFill: true });
  po.progress(0.7);

  // Smart-reframe: одиночный capture тоже приводим к ГОСТ-фреймингу
  // (голова 75%, глаза 63%, центр X). Делаем после finalize, чтобы работать
  // с уже корректно DPI/JFIF-патченной картинкой.
  try {
    po.substep('подгоняем под ГОСТ');
    const m = await measureFaceMetrics(url);
    if (m) {
      const reframed = await smartReframe(url, m, TYPES[gType]);
      // Прогоняем reframe-канвас через finalizeCapturedCanvas чтобы
      // получить выход 300 DPI с правильным DPI-патчем
      capCv.width = reframed.width; capCv.height = reframed.height;
      capCtx.drawImage(reframed, 0, 0);
      url = await finalizeCapturedCanvas(capCv, { skipBgFill: true });
      Log.info('Single capture: smart-reframed to GOST');
    } else {
      Log.warn('Single capture: face not found, keeping non-reframed output');
    }
  } catch (e) {
    Log.warn('Single capture smart-reframe failed, keeping non-reframed:', e.message);
  }
  po.progress(1);
  po.remove();
  Backup.saveFinal(url, { kind:'single-camera', type: gType });
  Log.info('Single capture done, type=', gType);
  showPreview(url, { kind:'single' });
}

/* showProcessing(initial) → { el, step(text), substep(text), progress(0..1), remove() }
   Pass step() updates to surface real-time progress to the user. */
function showProcessing(initial) {
  const po = document.createElement('div'); po.className = 'proc';
  po.innerHTML = `
    <div class="spin"></div>
    <p id="procStep">ОБРАБОТКА</p>
    <small id="procSub">${initial || ''}</small>
    <div id="procBar" style="width:200px;height:3px;background:rgba(232,213,163,.1);border-radius:2px;overflow:hidden;display:none;margin-top:6px">
      <div id="procBarFill" style="width:0%;height:100%;background:#F5C842;transition:width .25s"></div>
    </div>
    <small id="procLog" style="font-size:8px;color:rgba(232,213,163,.3);max-width:280px;text-align:left;font-family:monospace;line-height:1.4;white-space:pre-wrap;max-height:80px;overflow:hidden"></small>`;
  vfEl.appendChild(po);
  const stepEl = po.querySelector('#procStep');
  const subEl  = po.querySelector('#procSub');
  const barEl  = po.querySelector('#procBar');
  const fillEl = po.querySelector('#procBarFill');
  const logEl  = po.querySelector('#procLog');
  const tail = [];
  const append = (text) => {
    tail.push(`${new Date().toLocaleTimeString()} ${text}`);
    while (tail.length > 6) tail.shift();
    logEl.textContent = tail.join('\n');
  };
  return {
    el: po,
    step(text)    { stepEl.textContent = text.toUpperCase(); Log.info('proc.step:', text); append(text); },
    substep(text) { subEl.textContent  = text;               Log.debug('proc.sub:', text); append('… ' + text); },
    progress(p)   { barEl.style.display='block'; fillEl.style.width = Math.max(0, Math.min(1, p))*100 + '%'; },
    remove()      { po.remove(); },
  };
}

/* finalizeCapturedCanvas:
   - resamples to target 300 DPI pixel size for gType
   - runs bg flood-fill (unless skipped) and light normalization
   - returns JPEG dataURL with proper JFIF DPI bytes */
async function finalizeCapturedCanvas(srcCv, opts = {}) {
  const t = TYPES[gType];
  const tw = Math.round(t.wMM * TARGET_DPI / 25.4);
  const th = Math.round(t.hMM * TARGET_DPI / 25.4);
  const outCv = document.createElement('canvas');
  outCv.width = tw; outCv.height = th;
  const outCtx = outCv.getContext('2d');
  outCtx.imageSmoothingEnabled = true;
  outCtx.imageSmoothingQuality = 'high';
  outCtx.drawImage(srcCv, 0, 0, tw, th);

  try {
    if (gBgRemove && gRemoveBg) {
      const blob = await gRemoveBg(outCv, { model:'small', output:{ format:'image/png', quality:.92 } });
      const url = URL.createObjectURL(blob);
      await new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => {
          outCtx.fillStyle = '#fff'; outCtx.fillRect(0,0,tw,th);
          outCtx.drawImage(img, 0, 0, tw, th); URL.revokeObjectURL(url); res();
        };
        img.onerror = rej; img.src = url;
      });
    } else if (!opts.skipBgFill) {
      bgFloodFill(outCtx, tw, th);
    }
    if (!opts.skipLight) normLight(outCtx, tw, th);
  } catch (e) { console.warn('post-process:', e); }

  const raw = outCv.toDataURL('image/jpeg', .95);
  return patchJpegDpi(raw, TARGET_DPI);
}

function bgFloodFill(c, w, h) {
  const id = c.getImageData(0,0,w,h), d = id.data;
  let rS=0, gS=0, bS=0, n=0;
  const add = (x,y) => { const i=(y*w+x)*4; rS+=d[i]; gS+=d[i+1]; bS+=d[i+2]; n++; };
  for (let x=0; x<w; x++) { add(x,0); add(x,1); add(x,h-1); add(x,h-2); }
  for (let y=2; y<h-2; y++) { add(0,y); add(1,y); add(w-1,y); add(w-2,y); }
  const bgR=rS/n, bgG=gS/n, bgB=bS/n, thr=65;
  const vis = new Uint8Array(w*h), q=[];
  const enq = (x,y) => {
    if (x<0||x>=w||y<0||y>=h) return;
    const idx=y*w+x; if (vis[idx]) return; vis[idx]=1;
    const i=idx*4, dr=d[i]-bgR, dg=d[i+1]-bgG, db=d[i+2]-bgB;
    if (Math.sqrt(dr*dr+dg*dg+db*db) < thr) q.push(idx);
  };
  for (let x=0; x<w; x++) { enq(x,0); enq(x,h-1); }
  for (let y=1; y<h-1; y++) { enq(0,y); enq(w-1,y); }
  while (q.length) {
    const idx=q.pop(), x=idx%w, y=(idx/w)|0;
    d[idx*4]=255; d[idx*4+1]=255; d[idx*4+2]=255;
    enq(x+1,y); enq(x-1,y); enq(x,y+1); enq(x,y-1);
  }
  c.putImageData(id, 0, 0);
}

function normLight(c, w, h) {
  const id = c.getImageData(0,0,w,h), d = id.data;
  const fx = w*.18|0, fy = h*.05|0, fw = w*.64|0, fh = h*.78|0;
  let s=0, n=0;
  for (let y=fy; y<Math.min(fy+fh,h); y++)
    for (let x=fx; x<Math.min(fx+fw,w); x++) {
      const i=(y*w+x)*4;
      if (d[i]>250 && d[i+1]>250 && d[i+2]>250) continue;
      s += .299*d[i] + .587*d[i+1] + .114*d[i+2]; n++;
    }
  if (!n || !s) return;
  const avg = s/n;
  // Если средняя яркость лица уже в нормальном диапазоне — ничего не трогаем
  if (avg >= 115 && avg <= 180) return;
  // Мягкий target и клип коэффициента, чтобы не пересвечивать
  const targetAvg = 140;
  let m = targetAvg / avg;
  m = Math.max(0.75, Math.min(1.25, m));
  if (Math.abs(m - 1) < .04) return;
  // Гамма-подобная мягкая кривая: яркие пиксели почти не меняются, тени поднимаются
  const cl = v => Math.max(0, Math.min(255, v|0));
  const adjust = v => {
    const t = v / 255;
    const soft = m > 1
      ? 1 - Math.pow(1 - t, 1/m)        // поднять тени, не трогать highlights
      : Math.pow(t, 1/m);                // приглушить highlights
    return cl(soft * 255);
  };
  for (let y=fy; y<Math.min(fy+fh,h); y++)
    for (let x=fx; x<Math.min(fx+fw,w); x++) {
      const i=(y*w+x)*4;
      if (d[i]>250 && d[i+1]>250 && d[i+2]>250) continue;
      d[i]=adjust(d[i]); d[i+1]=adjust(d[i+1]); d[i+2]=adjust(d[i+2]);
    }
  c.putImageData(id, 0, 0);
}

/* ═══════════════════════════════════════════════════════
   JFIF DPI metadata patch
═══════════════════════════════════════════════════════ */

function patchJpegDpi(dataUrl, dpi) {
  const b64 = dataUrl.split(',')[1];
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i=0; i<bin.length; i++) buf[i] = bin.charCodeAt(i);
  if (buf[0] !== 0xFF || buf[1] !== 0xD8) return dataUrl;
  if (buf[2] === 0xFF && buf[3] === 0xE0 &&
      buf[6] === 0x4A && buf[7] === 0x46 && buf[8] === 0x49 && buf[9] === 0x46) {
    buf[13] = 0x01;
    buf[14] = (dpi>>8)&0xFF; buf[15] = dpi&0xFF;
    buf[16] = (dpi>>8)&0xFF; buf[17] = dpi&0xFF;
    buf[18] = 0; buf[19] = 0;
    return u8ToDataUrl(buf);
  }
  const app0 = new Uint8Array([
    0xFF,0xE0, 0x00,0x10, 0x4A,0x46,0x49,0x46,0x00, 0x01,0x01, 0x01,
    (dpi>>8)&0xFF, dpi&0xFF, (dpi>>8)&0xFF, dpi&0xFF, 0x00, 0x00
  ]);
  const out = new Uint8Array(buf.length + app0.length);
  out.set(buf.subarray(0,2), 0);
  out.set(app0, 2);
  out.set(buf.subarray(2), 2 + app0.length);
  return u8ToDataUrl(out);
}

function u8ToDataUrl(u8) {
  let s = '';
  for (let i=0; i<u8.length; i++) s += String.fromCharCode(u8[i]);
  return 'data:image/jpeg;base64,' + btoa(s);
}

/* ═══════════════════════════════════════════════════════
   AI background replacement (Gemini) with two-stage verify:
   1) same person — facial metrics (iod, e2c, n2m) within ±5%
   2) background actually white — sample edge strips
   On any failure → keep original, explain why.
═══════════════════════════════════════════════════════ */

async function aiCleanBg() {
  const ai = makeAiBackend();
  if (!ai.configured) { toast('Введите API-ключ Gemini в ⚙ настройках', 'warn'); openSettings(); return; }
  const source = gLastSourceUrl || gLastPhotoUrl;
  if (!source) { toast('Нет исходного фото', 'err'); return; }

  // Pre-flight: считаем лица в кадре отдельно от processing UI
  const preMetrics = await measureFaceMetrics(source);
  if (!preMetrics) {
    toast('Не нашёл лицо на исходном фото — нельзя проверить искажения', 'warn');
    return;
  }
  if (preMetrics.faceCount > 1) {
    const ok = confirm(
      `В кадре ${preMetrics.faceCount} лица. AI может оставить не того, и фильтр Gemini ` +
      `часто отвергает такие фото (особенно с детьми). Снимите крупнее, чтобы был только нужный человек.\n\n` +
      `Если фото для ребёнка — используйте режим «👶 Ребёнок» внизу: серия 5 кадров одного ребёнка.\n\n` +
      `Продолжить всё равно?`);
    if (!ok) return;
  }

  let po = showProcessing('замена фона через Gemini');
  po.step('1/4: пропорции исходника');
  po.substep(`найдено ${preMetrics.faceCount} лиц(о)`);
  po.progress(0.05);
  const refMetrics = preMetrics;
  Log.info('aiCleanBg ref:', refMetrics);

  // Перед отправкой в Gemini ужимаем картинку до 1024 px на длинной стороне.
  // НЕ обрезаем — AI нужен контекст вокруг лица для понимания фона и пропорций.
  // Slim resize: меньше токенов и времени, но AI видит окружение.
  let sourceForAi = source;
  try {
    po.substep('готовим картинку для AI');
    const srcImg = await loadImage(source);
    const MAX_DIM = 1024;
    const longest = Math.max(srcImg.width, srcImg.height);
    if (longest > MAX_DIM) {
      const scale = MAX_DIM / longest;
      const sendCv = document.createElement('canvas');
      sendCv.width  = Math.round(srcImg.width * scale);
      sendCv.height = Math.round(srcImg.height * scale);
      const ox = sendCv.getContext('2d');
      ox.imageSmoothingEnabled = true; ox.imageSmoothingQuality = 'high';
      ox.drawImage(srcImg, 0, 0, sendCv.width, sendCv.height);
      sourceForAi = sendCv.toDataURL('image/jpeg', 0.92);
      Log.info(`aiCleanBg resize: ${srcImg.width}x${srcImg.height} → ${sendCv.width}x${sendCv.height}`);
    } else {
      Log.info(`aiCleanBg: source ${srcImg.width}x${srcImg.height} fits MAX_DIM, no resize`);
    }
  } catch (e) {
    Log.warn('aiCleanBg resize failed, sending raw source:', e.message);
  }

  po.step('2/4: Gemini заменяет фон');
  po.substep('ожидаем результат… до 30 сек');
  po.progress(0.3);
  let aiUrl;
  try {
    const t0 = Date.now();
    aiUrl = await ai.replaceBg(sourceForAi);
    Log.info('replaceBg done in', ((Date.now()-t0)/1000).toFixed(1), 's');
  } catch (e) {
    po.remove(); Log.error('replaceBg failed:', e);
    toast('Gemini: ' + (e.message||e), 'err');
    return;
  }
  po.progress(0.55);

  po.step('3/4: тот же ли человек?');
  po.substep('MediaPipe сверяет геометрию лица');
  po.progress(0.65);
  const aiMetrics = await measureFaceMetrics(aiUrl);
  // Считаем максимальное отклонение по всем трём метрикам, не выходим из цикла на первом
  let maxDevPct = 0, maxDevK = '';
  if (!aiMetrics) {
    maxDevPct = 1; maxDevK = 'no-face';
  } else {
    for (const k of ['iod','e2c','n2m']) {
      const d = Math.abs(aiMetrics[k] - refMetrics[k]) / Math.max(Math.abs(refMetrics[k]), 1e-6);
      Log.info(`bg-check ${k}: ref=${refMetrics[k].toFixed(3)} ai=${aiMetrics[k].toFixed(3)} dev=${(d*100).toFixed(1)}%`);
      if (d > maxDevPct) { maxDevPct = d; maxDevK = k; }
    }
    po.substep(`лицо: макс отклонение ${(maxDevPct*100).toFixed(1)}% (${maxDevK})`);
  }
  // Жёсткий лимит — выше этого AI уже подменил человека.
  // Мягкий лимит — ретушь/закрытие рта/выравнивание плеч могут естественно
  // сдвинуть метрики на 10-15% (особенно n2m при закрытии открытого рта).
  const HARD_FACE_LIMIT = 0.18;  // 18% — оставляем только явные подмены лица
  const SOFT_FACE_LIMIT = 0.05;  // 5% — выше = есть ретушь, но это не подмена
  const personHardFail = maxDevPct > HARD_FACE_LIMIT || !aiMetrics;
  const personSoftWarn = !personHardFail && maxDevPct > SOFT_FACE_LIMIT;
  po.progress(0.8);

  po.step('4/4: белый ли фон?');
  po.substep('сэмплируем края изображения');
  po.progress(0.9);
  const bgCheck = await checkBackgroundWhite(aiUrl);
  Log.info('bg-white check:', bgCheck);
  po.substep(bgCheck.ok ? `фон ок: средняя яркость ${bgCheck.meanL.toFixed(0)}/255` : `фон НЕ белый: ${bgCheck.reason}`);
  po.progress(1);
  po.remove();

  // Hard reject — лицо явно подменено
  if (personHardFail) {
    const reason = aiMetrics ? `${maxDevK} ${(maxDevPct*100).toFixed(1)}% > ${(HARD_FACE_LIMIT*100)}%` : 'лицо не найдено';
    toast(`AI слишком сильно изменил лицо: ${reason}. Попробуйте «🔁 AI ещё» — другой результат.`, 'err');
    Log.warn('aiCleanBg HARD reject — person check:', reason);
    return;
  }
  const maxDev = (maxDevPct*100).toFixed(1);

  // Smart-reframe: подгоняем кадр AI-результата под ГОСТ (центрируем лицо,
  // глаза на 60% от низа, голова 75% высоты). AI часто кадрирует криво —
  // мы знаем точные пропорции лица из measureFaceMetrics, можем переобрезать.
  let reframedCv;
  try {
    reframedCv = await smartReframe(aiUrl, aiMetrics, TYPES[gType]);
    Log.info('smartReframe done: out =', reframedCv.width + 'x' + reframedCv.height);
  } catch (e) {
    Log.warn('smartReframe failed, falling back to center-crop:', e.message);
    const img = await loadImage(aiUrl);
    const t = TYPES[gType];
    const sw = img.width, sh = img.height;
    let cW, cH;
    if (sw/sh > t.aspect) { cH = sh; cW = (sh*t.aspect)|0; }
    else                  { cW = sw; cH = (sw/t.aspect)|0; }
    const sx = ((sw-cW)/2)|0, sy = ((sh-cH)/2)|0;
    reframedCv = document.createElement('canvas');
    reframedCv.width = cW; reframedCv.height = cH;
    reframedCv.getContext('2d').drawImage(img, sx, sy, cW, cH, 0, 0, cW, cH);
  }
  capCv.width = reframedCv.width; capCv.height = reframedCv.height;
  capCtx.drawImage(reframedCv, 0, 0);
  const finalUrl = await finalizeCapturedCanvas(capCv, { skipBgFill: true, skipLight: true });

  // ГОСТ-проверка финального результата: высота головы, линия глаз, фон
  const gost = await checkGostCompliance(finalUrl);
  Log.info('GOST check:', gost);

  Backup.saveFinal(finalUrl, { kind: (bgCheck.ok && gost.ok && !personSoftWarn) ? 'ai-bg' : 'ai-bg-warn', type: gType, bgCheck, gost, personSoftWarn, maxDevPct });

  const gostBadge = gost.ok
    ? `ГОСТ ✓`
    : `ГОСТ: ${gost.issues.length} замечание(й)`;
  const personBadge = personSoftWarn
    ? `лицо ±${maxDev}% (ретушь)`
    : `лицо ±${maxDev}%`;

  if (bgCheck.ok && gost.ok && !personSoftWarn) {
    toast(`AI фон: OK. ${personBadge}, фон ${bgCheck.meanL.toFixed(0)}/255, ${gostBadge}`, 'ok');
    showPreview(finalUrl, { kind:'ai-bg', gost, maxDevPct });
  } else {
    const issues = [];
    if (personSoftWarn) issues.push(`лицо изменилось на ${maxDev}% (ретушь/закрытие рта)`);
    if (!bgCheck.ok)    issues.push(`фон: ${bgCheck.reason}`);
    if (!gost.ok)       issues.push(...gost.issues);
    toast(`AI фон с замечаниями: ${issues.join('; ')}. Нажмите «🔁 AI ещё» для другой попытки.`, 'warn');
    Log.warn('aiCleanBg soft-fail:', issues.join('; '));
    showPreview(finalUrl, { kind:'ai-bg-warn', gost, maxDevPct });
  }
}

/* Smart-reframe: AI часто отдаёт фото с лицом не по центру и неправильной
   высотой головы. Используя точные координаты лица (от MediaPipe), мы
   переобрезаем результат под ГОСТ: лицо по центру X, голова 75% высоты,
   глаза 60% от низа. Если AI-картинка меньше нужного кропа в какой-то
   стороне — добавляем белые поля. */
async function smartReframe(dataUrl, metrics, typeSpec) {
  const TARGET_HEAD_PCT = 0.75;          // голова занимает 75% высоты выхода
  const TARGET_EYE_FROM_BOTTOM = 0.63;   // середина диапазона 56-70%
  const HAIR_MULT = 1.18;                // bbox без волос → real head height

  const img = await loadImage(dataUrl);
  const W = img.width, H = img.height;
  const aspect = typeSpec.aspect;        // 35/45 ≈ 0.778

  // Реальная высота головы в пикселях источника (с поправкой на волосы)
  const headH_src = metrics.bboxHeight * H;  // bboxHeight уже умножен на 1.18 в measureFaceMetrics
  // Линия глаз в пикселях источника
  const eyeY_src = metrics.eyeYRel * H;
  // Центр лица в пикселях источника
  const faceCX_src = metrics.bboxCenterX * W;
  // Поскольку bbox не включает волосы, реальный «центр головы» немного выше bboxCenterY.
  // Для smart-reframe нам важен eye Y (он точный) — от него и считаем.

  // Размер кропа: голова должна стать TARGET_HEAD_PCT от высоты → cropH = headH_src / TARGET_HEAD_PCT
  let cropH = headH_src / TARGET_HEAD_PCT;
  let cropW = cropH * aspect;

  // Координаты кропа: face center по горизонтали, eye Y на (1-TARGET_EYE_FROM_BOTTOM) от верха кропа
  let cropX = faceCX_src - cropW / 2;
  let cropY = eyeY_src - (1 - TARGET_EYE_FROM_BOTTOM) * cropH;

  // Если кроп выходит за границы — определяем сколько белых полей нужно
  const padL = Math.max(0, -cropX);
  const padT = Math.max(0, -cropY);
  const padR = Math.max(0, (cropX + cropW) - W);
  const padB = Math.max(0, (cropY + cropH) - H);

  const out = document.createElement('canvas');
  out.width  = Math.round(cropW);
  out.height = Math.round(cropH);
  const ox = out.getContext('2d');
  // Заливаем белым (фон) на случай, если будут поля
  ox.fillStyle = '#FFFFFF';
  ox.fillRect(0, 0, out.width, out.height);

  // Источник: clamp к границам картинки
  const sX = Math.max(0, cropX);
  const sY = Math.max(0, cropY);
  const sW = Math.min(W - sX, cropW - padL - padR);
  const sH = Math.min(H - sY, cropH - padT - padB);
  // Дестинация: смещение на padL/padT внутри out
  ox.drawImage(img, sX, sY, sW, sH, padL, padT, sW, sH);

  Log.info(`smartReframe: src ${W}x${H}, crop ${Math.round(cropW)}x${Math.round(cropH)}, ` +
    `face cx=${(metrics.bboxCenterX*100).toFixed(0)}% eyeY=${(metrics.eyeYRel*100).toFixed(0)}% headH=${(metrics.bboxHeight*100).toFixed(0)}%, ` +
    `pads L${padL.toFixed(0)} T${padT.toFixed(0)} R${padR.toFixed(0)} B${padB.toFixed(0)}`);
  return out;
}

/* ГОСТ-проверка для итогового кадра: высота головы и линия глаз.
   Запускается через MediaPipe на финальной картинке 35×45 / 30×40 @ 300 DPI.
   Возвращает {ok, issues:[строки]}. Только мягкие замечания — пользователь решает. */
async function checkGostCompliance(dataUrl) {
  const t = TYPES[gType];
  const m = await measureFaceMetrics(dataUrl);
  if (!m) return { ok:false, issues:['лицо не найдено для проверки ГОСТ'] };
  const img = await loadImage(dataUrl);
  // MediaPipe возвращает bbox в относительных координатах (0..1). Высчитаем:
  //   headPct = (chin - crown), но у нас есть только bbox через measureFaceMetrics.
  // measureFaceMetrics не возвращает сам bbox, давайте получим его быстро отдельно.
  // Используем уже посчитанный e2c (от линии глаз до подбородка bbox) и
  //   восстановим bbox.height ≈ e2c / (примерно 0.62 — отношение eye-to-chin к высоте лица)
  //   для приблизительной оценки.
  // Лучше: дополним measureFaceMetrics, чтобы возвращал bbox.height/yCenter.
  const issues = [];
  // Если у нас есть bbox, проверяем; иначе skip — этот случай защищён в коде.
  if (m.bboxHeight != null) {
    const headPct = m.bboxHeight;  // bbox.height ≈ доля лица в кадре
    if (headPct < t.headPctMin - 0.03) issues.push(`голова мала: ${(headPct*100).toFixed(0)}% от высоты (нужно ${(t.headPctMin*100).toFixed(0)}–${(t.headPctMax*100).toFixed(0)}%)`);
    if (headPct > t.headPctMax + 0.03) issues.push(`голова велика: ${(headPct*100).toFixed(0)}% от высоты (нужно ${(t.headPctMin*100).toFixed(0)}–${(t.headPctMax*100).toFixed(0)}%)`);
  }
  if (m.eyeFromBottom != null) {
    const eb = m.eyeFromBottom;
    if (eb < t.eyeFromBottomMin - 0.03) issues.push(`глаза низко: ${(eb*100).toFixed(0)}% от низа (нужно ${(t.eyeFromBottomMin*100).toFixed(0)}–${(t.eyeFromBottomMax*100).toFixed(0)}%)`);
    if (eb > t.eyeFromBottomMax + 0.03) issues.push(`глаза высоко: ${(eb*100).toFixed(0)}% от низа (нужно ${(t.eyeFromBottomMin*100).toFixed(0)}–${(t.eyeFromBottomMax*100).toFixed(0)}%)`);
  }
  if (Math.abs(m.roll) > 5)  issues.push(`наклон головы ${m.roll.toFixed(0)}° (нужно ≤ 5°)`);
  if (Math.abs(m.yaw)  > 0.08) issues.push(`поворот головы (yaw=${(m.yaw*100).toFixed(0)}% — нужно ≤ 8%)`);
  return { ok: issues.length === 0, issues, metrics: m };
}

/* Проверка фона: сэмплируем ТОЛЬКО верхнюю полосу (~15% высоты).
   В document-photo голова занимает 70–80% от верха к низу, а плечи/одежда
   неизбежно попадают в боковые и нижнюю полосы — давая ложный «неоднородный фон».
   Верх над макушкой — единственная зона, где надёжно виден чистый фон. */
async function checkBackgroundWhite(dataUrl) {
  const img = await loadImage(dataUrl);
  const cv = document.createElement('canvas');
  cv.width = img.width; cv.height = img.height;
  const cx = cv.getContext('2d');
  cx.drawImage(img, 0, 0);
  const w = cv.width, h = cv.height;
  const stripH = Math.max(8, h*0.12|0);  // верхние 12%
  const sideInset = Math.max(2, w*0.05|0);  // отступ 5% от боков, чтобы не зацепить уши/волосы
  const d = cx.getImageData(sideInset, 0, w - 2*sideInset, stripH).data;
  const samples = [];
  for (let i=0; i<d.length; i+=4) {
    samples.push(.299*d[i] + .587*d[i+1] + .114*d[i+2]);
  }
  const meanL = samples.reduce((a,b)=>a+b,0) / samples.length;
  const varL = samples.reduce((a,b)=>a + (b-meanL)*(b-meanL), 0) / samples.length;
  const stdL = Math.sqrt(varL);
  if (meanL < 190) return { ok:false, meanL, stdL, reason:`верх фона тёмный, средняя яркость ${meanL.toFixed(0)}/255 (нужно ≥ 190)` };
  if (stdL > 50)   return { ok:false, meanL, stdL, reason:`верх фона неоднородный, σ=${stdL.toFixed(0)} (нужно ≤ 50)` };
  return { ok:true, meanL, stdL };
}

/* ═══════════════════════════════════════════════════════
   Print sheet
═══════════════════════════════════════════════════════ */

function printSheet(url) {
  const t = TYPES[gType];
  const photoW = t.wMM, photoH = t.hMM;
  let pageW, pageH, cols, rows, pageCss, padding;
  if (gPaper === 'a4') {
    pageW = 210; pageH = 297;
    padding = 8;
    pageCss = '@page { size: A4 portrait; margin: 0; }';
    cols = Math.floor((pageW - 2*padding) / (photoW + 4));
    rows = Math.floor((pageH - 2*padding) / (photoH + 4));
  } else {
    pageW = 152; pageH = 102;  // 10×15 landscape
    padding = 4;
    pageCss = '@page { size: 152mm 102mm; margin: 0; }';
    cols = Math.floor((pageW - 2*padding) / (photoW + 3));
    rows = Math.floor((pageH - 2*padding) / (photoH + 3));
  }
  const total = cols * rows;

  const cells = Array.from({ length: total }, () => `
    <div class="cell">
      <img src="${url}" alt=""/>
      <span class="m m-tl"></span><span class="m m-tr"></span>
      <span class="m m-bl"></span><span class="m m-br"></span>
    </div>`).join('');

  const html = `<!doctype html><html lang="ru"><head><meta charset="utf-8">
<title>Печать ${cols}×${rows} (${t.size})</title>
<style>
  ${pageCss}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:${pageW}mm;height:${pageH}mm;background:#fff}
  body{padding:${padding}mm;display:grid;
       grid-template-columns:repeat(${cols},${photoW}mm);
       grid-template-rows:repeat(${rows},${photoH}mm);
       gap:3mm;align-content:start;justify-content:center}
  .cell{position:relative;width:${photoW}mm;height:${photoH}mm}
  .cell img{width:${photoW}mm;height:${photoH}mm;display:block;image-rendering:-webkit-optimize-contrast}
  .m{position:absolute;background:#888}
  .m-tl,.m-tr{top:-1.5mm;height:.2mm;width:3mm}
  .m-bl,.m-br{bottom:-1.5mm;height:.2mm;width:3mm}
  .m-tl{left:-1.5mm}.m-tr{right:-1.5mm}.m-bl{left:-1.5mm}.m-br{right:-1.5mm}
  .v{position:absolute;background:#888;width:.2mm;height:3mm}
  @media print { html,body{margin:0;padding:${padding}mm} }
</style></head><body>${cells}
<script>
  window.onload = function() { setTimeout(function(){ window.print(); }, 250); };
  window.onafterprint = function() { window.close(); };
<\/script>
</body></html>`;

}

async function ingestSingleFile(file) {
  try {
    Log.info('ingestSingleFile:', file.name||'(no name)', file.size, 'bytes');
    gCaptured = true;
    cancelAnimationFrame(gRaf); clearTimeout(gAnalyzeTimer);
    const po = showProcessing(`${file.name || 'фото'} · ${(file.size/1024).toFixed(0)} КБ`);
    po.step('Чтение файла');
    po.progress(0.2);
    const dataUrl = await fileToDataUrl(file);
    po.step('Декодирование');
    po.progress(0.4);
    const img = await loadImage(dataUrl);
    po.substep(`${img.width}×${img.height} px`);

    const { aspect } = TYPES[gType];
    const sw = img.width, sh = img.height;
    let cW, cH;
    if (sw/sh > aspect) { cH = sh; cW = (sh*aspect)|0; }
    else                { cW = sw; cH = (sw/aspect)|0; }
    const sx = ((sw-cW)/2)|0, sy = ((sh-cH)/2)|0;
    capCv.width = cW; capCv.height = cH;
    capCtx.drawImage(img, sx, sy, cW, cH, 0, 0, cW, cH);

    po.step('Постобработка');
    po.substep('масштаб до 300 DPI, свет');
    po.progress(0.7);
    const url = await finalizeCapturedCanvas(capCv, { skipBgFill: true });
    po.progress(1);
    po.remove();
    Backup.saveFinal(url, { kind:'single-upload', type: gType, name: file.name });
    showPreview(url, { kind:'single' });
  } catch (e) {
    Log.error('ingestSingleFile failed:', e);
    toast('Не удалось обработать фото: ' + (e.message||e), 'err');
  }
}

  document.getElementById('childPill').classList.toggle('on', gMode==='child');
  document.getElementById('childTabs').classList.toggle('show', gMode==='child');
  renderCtrl();

}

function setChildSrc(s) {
  gChildSrc = s;
  document.getElementById('ctab0').classList.toggle('on', s==='burst');
  document.getElementById('ctab1').classList.toggle('on', s==='upload');
  renderCtrl();

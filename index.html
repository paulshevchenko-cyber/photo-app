<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0E0E12"/>
<title>Фото на документы РФ</title>

<!-- TensorFlow.js + BlazeFace for reliable cross-device face detection -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;background:#0E0E12}
body{overflow:hidden;-webkit-tap-highlight-color:transparent;font-family:'Courier New',monospace}
button{cursor:pointer;font-family:'Courier New',monospace}

.app{
  height:100dvh;display:flex;flex-direction:column;
  background:#0E0E12;color:#E8D5A3;
  max-width:480px;margin:0 auto;
}

/* ── Header ── */
.hdr{padding:9px 14px 7px;border-bottom:1px solid rgba(232,213,163,.1);background:#000;flex-shrink:0}
.hdr-title{font-size:10px;letter-spacing:.16em;color:#F5C842;font-weight:bold;margin-bottom:7px}
.pills{display:flex;gap:5px}
.pill{background:transparent;border:1px solid rgba(232,213,163,.2);border-radius:3px;
  color:rgba(232,213,163,.45);font-size:10px;padding:4px 10px;letter-spacing:.04em;transition:all .15s}
.pill.on{background:rgba(245,200,66,.12);border-color:#F5C842;color:#F5C842}
.sub{font-size:9px;color:rgba(232,213,163,.32);margin-top:4px;letter-spacing:.06em}

/* ── Viewfinder ── */
.vf{flex:1;position:relative;background:#000;overflow:hidden;min-height:0}
canvas.live{width:100%;height:100%;object-fit:cover;display:block}
.mirror{transform:scaleX(-1)}
.svg-ov{position:absolute;inset:0;pointer-events:none}

/* hint */
.hint{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.72);font-size:10px;padding:6px 16px;
  border-radius:20px;white-space:nowrap;pointer-events:none;
  border:1px solid rgba(232,213,163,.15);color:rgba(232,213,163,.8);
  max-width:90%;text-align:center;transition:color .2s,border-color .2s;
  letter-spacing:.05em;
}
.hint.ok  {color:#4ade80;border-color:rgba(74,222,128,.4)}
.hint.warn{color:#fb923c;border-color:rgba(251,146,60,.35)}

/* flash */
.flash{position:absolute;inset:0;background:#fff;z-index:10;
  animation:fl .22s forwards;pointer-events:none}
@keyframes fl{to{opacity:0}}

/* processing */
.proc{position:absolute;inset:0;background:rgba(0,0,0,.9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20}
.spin{width:36px;height:36px;border:3px solid rgba(245,200,66,.15);
  border-top-color:#F5C842;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.proc p{color:#E8D5A3;font-size:11px;letter-spacing:.12em}
.proc small{font-size:9px;color:rgba(232,213,163,.4);letter-spacing:.07em}

/* cam error */
.err{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;padding:28px;background:rgba(0,0,0,.9);
  color:#E8D5A3;font-size:13px;text-align:center;line-height:1.6}
.err i{font-size:36px;font-style:normal}

/* preview after capture */
.prev{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111}
.prev img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.prev-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);
  border:1px solid #4ade80;border-radius:4px;padding:4px 10px;font-size:10px;color:#fff;letter-spacing:.05em}

/* ── Status bar ── */
.sbar{display:flex;gap:4px;padding:5px 8px;background:rgba(0,0,0,.5);
  border-top:1px solid rgba(232,213,163,.08);flex-shrink:0}
.sp{flex:1;display:flex;align-items:center;gap:4px;padding:4px 7px;border-radius:3px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  overflow:hidden;font-size:8.5px;letter-spacing:.04em}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .25s}
.st{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .25s}

/* model loading bar */
.mbar{height:2px;background:rgba(245,200,66,.15);flex-shrink:0;position:relative;overflow:hidden}
.mbar-inner{height:100%;background:#F5C842;animation:mb 1.4s ease-in-out infinite}
@keyframes mb{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* ── Controls ── */
.ctrl{display:flex;align-items:center;justify-content:space-around;
  padding:12px 24px;background:#0E0E12;border-top:1px solid rgba(232,213,163,.08);
  gap:10px;flex-shrink:0}
.cbtn{width:64px;height:64px;border-radius:50%;border:3px solid #F5C842;
  background:transparent;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 0 16px rgba(245,200,66,.15);transition:border-color .25s,box-shadow .25s}
.cbtn.rdy{border-color:#4ade80;animation:rp 1.6s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 16px rgba(74,222,128,.2)}50%{box-shadow:0 0 28px rgba(74,222,128,.55)}}
.cbtn:active{transform:scale(.93)}
.ci{width:48px;height:48px;border-radius:50%;background:#F5C842;transition:background .25s}
.cbtn.rdy .ci{background:#4ade80}
.icobtn{width:42px;height:42px;border-radius:50%;border:1px solid rgba(232,213,163,.2);
  background:rgba(232,213,163,.04);color:#E8D5A3;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icobtn.on{border-color:#60a5fa;background:rgba(96,165,250,.1);color:#60a5fa}
.abtn{flex:1;padding:11px 0;background:transparent;border:1px solid rgba(232,213,163,.25);
  color:#E8D5A3;border-radius:4px;font-size:11px;letter-spacing:.1em}
.abtn.p{background:rgba(245,200,66,.12);border-color:#F5C842;color:#F5C842}

/* ── Req panel ── */
.req{padding:7px 14px 10px;border-top:1px solid rgba(232,213,163,.07);background:rgba(0,0,0,.25);flex-shrink:0}
.req h4{font-size:8px;letter-spacing:.2em;color:rgba(232,213,163,.28);margin-bottom:5px}
.req-g{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.ri{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;
  border-bottom:1px solid rgba(232,213,163,.06)}
.rk{color:rgba(232,213,163,.35)}
.rv{color:rgba(232,213,163,.7);text-align:right}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════
// Constants
// ═══════════════════════════════════════════════════════
const TYPES = {
  passport:{ label:'Паспорт / Загран', size:'35×45 мм', aspect:35/45, desc:'Загранпаспорт, ВНЖ, СНИЛС' },
  visa:    { label:'Виза',             size:'35×45 мм', aspect:35/45, desc:'Шенген, US, UK, Китай' },
  zagran:  { label:'Воен. билет',      size:'30×40 мм', aspect:30/40, desc:'Военный билет, приписное' },
};
const REQS = [
  ['Размер', null], ['Лицо','70–80% высоты'],
  ['Фон','белый / светло-серый'], ['Взгляд','прямо в объектив'],
  ['Выражение','нейтральное'], ['Качество','без теней, резкое'],
];
const FG = { cy:.47, oh:.74, ow:.54, ey:.55, cy2:.85, cy3:.11 };

// ═══════════════════════════════════════════════════════
// Face analysis (BlazeFace returns 6 keypoints:
//   0=rightEye 1=leftEye 2=nose 3=mouth 4=rightEar 5=leftEar)
// ═══════════════════════════════════════════════════════
function analyzeFace(pred, vw, vh) {
  const [x1,y1] = pred.topLeft;
  const [x2,y2] = pred.bottomRight;
  const fw = x2-x1, fh = y2-y1;
  const cx = (x1+x2)/2/vw, cy = (y1+y2)/2/vh;
  const nh = fh/vh;

  const result = { pos:'ok', head:'ok' };

  // Position
  if (nh < 0.30) { result.pos = 'too_far'; }
  else if (nh > 0.82) { result.pos = 'too_close'; }
  else if (Math.abs(cx-.50) > .15 || Math.abs(cy-.47) > .16) { result.pos = 'off_center'; }

  // Head pose from landmarks
  const lm = pred.landmarks; // shape [6,2]
  if (lm && lm.length >= 4) {
    const re = lm[0], le = lm[1], nose = lm[2], mouth = lm[3];
    // Roll: angle between eyes (positive = right eye higher)
    const dx = le[0]-re[0], dy = le[1]-re[1];
    const roll = Math.atan2(dy, dx) * 180/Math.PI;
    if (roll > 8)       { result.head = 'tilt_right'; }
    else if (roll < -8) { result.head = 'tilt_left'; }
    else {
      // Yaw: nose offset from eye midpoint, normalised by face width
      const eyeMidX = (re[0]+le[0])/2;
      const nOff = (nose[0]-eyeMidX)/fw;
      if      (nOff >  0.08) { result.head = 'turn_right'; }
      else if (nOff < -0.08) { result.head = 'turn_left'; }
      else {
        // Pitch: distance eye-mid to nose vs nose to mouth
        const eyeMidY = (re[1]+le[1])/2;
        const e2n = (nose[1]-eyeMidY)/fh;
        const n2m = (mouth[1]-nose[1])/fh;
        if      (e2n < 0.18 || n2m > 0.40) { result.head = 'look_up'; }
        else if (e2n > 0.42 || n2m < 0.12) { result.head = 'look_down'; }
      }
    }
  }
  return result;
}

function analyzeBrightness(video) {
  const W=64, H=48;
  const c = document.createElement('canvas');
  c.width=W; c.height=H;
  const ctx = c.getContext('2d');
  ctx.drawImage(video, video.videoWidth*.25, video.videoHeight*.15, video.videoWidth*.5, video.videoHeight*.7, 0,0,W,H);
  const d = ctx.getImageData(0,0,W,H).data;
  let sum=0, lSum=0, rSum=0;
  const n=W*H;
  for (let i=0;i<n;i++) {
    const idx=i*4, b=.299*d[idx]+.587*d[idx+1]+.114*d[idx+2];
    sum+=b;
    if(i%W < W/2) lSum+=b; else rSum+=b;
  }
  const avg=sum/n;
  return { avg, evenness: avg>0 ? Math.abs(lSum-rSum)/(avg*n) : 0 };
}

// ═══════════════════════════════════════════════════════
// Background removal: edge flood-fill + refinement
// ═══════════════════════════════════════════════════════
function removeBackground(ctx, w, h) {
  const imgData = ctx.getImageData(0,0,w,h);
  const d = imgData.data;
  const thr = 55;

  // Sample bg from edges (top/left/right strips + bottom corners)
  let rS=0,gS=0,bS=0,cnt=0;
  const addPx = (px,py) => {
    const i=(py*w+px)*4;
    rS+=d[i]; gS+=d[i+1]; bS+=d[i+2]; cnt++;
  };
  const strip = 4;
  for(let x=0;x<w;x++) { addPx(x,0);addPx(x,1); }
  for(let y=0;y<h;y++) { addPx(0,y);addPx(1,y);addPx(w-1,y);addPx(w-2,y); }
  for(let x=0;x<w;x++) { addPx(x,h-1);addPx(x,h-2); }
  const bgR=rS/cnt, bgG=gS/cnt, bgB=bS/cnt;

  // Flood fill from every edge pixel
  const visited = new Uint8Array(w*h);
  const queue = [];

  const isBackground = (i) => {
    const dr=d[i]-bgR, dg=d[i+1]-bgG, db=d[i+2]-bgB;
    return Math.sqrt(dr*dr+dg*dg+db*db) < thr;
  };
  const enqueue = (x,y) => {
    if(x<0||x>=w||y<0||y>=h) return;
    const idx=y*w+x;
    if(visited[idx]) return;
    visited[idx]=1;
    if(isBackground(idx*4)) queue.push(idx);
  };
  for(let x=0;x<w;x++){enqueue(x,0);enqueue(x,h-1);}
  for(let y=0;y<h;y++){enqueue(0,y);enqueue(w-1,y);}

  while(queue.length) {
    const idx=queue.pop();
    const x=idx%w, y=Math.floor(idx/w);
    d[idx*4]=255; d[idx*4+1]=255; d[idx*4+2]=255;
    enqueue(x+1,y);enqueue(x-1,y);enqueue(x,y+1);enqueue(x,y-1);
  }
  ctx.putImageData(imgData,0,0);
}

// Normalise face brightness
function smoothLight(ctx, w, h) {
  const imgData = ctx.getImageData(0,0,w,h);
  const d = imgData.data;
  const fx=Math.floor(w*.18),fy=Math.floor(h*.05),fw2=Math.floor(w*.64),fh2=Math.floor(h*.78);
  let sum=0,cnt=0;
  for(let y=fy;y<Math.min(fy+fh2,h);y++)
    for(let x=fx;x<Math.min(fx+fw2,w);x++){
      const i=(y*w+x)*4;
      if(d[i]>250&&d[i+1]>250&&d[i+2]>250) continue;
      sum+=.299*d[i]+.587*d[i+1]+.114*d[i+2]; cnt++;
    }
  if(!cnt) return;
  const mult = 158/(sum/cnt);
  if(Math.abs(mult-1)<.06) return;
  const cl = v=>Math.max(0,Math.min(255,v|0));
  for(let y=fy;y<Math.min(fy+fh2,h);y++)
    for(let x=fx;x<Math.min(fx+fw2,w);x++){
      const i=(y*w+x)*4;
      if(d[i]>250&&d[i+1]>250&&d[i+2]>250) continue;
      d[i]=cl(d[i]*mult); d[i+1]=cl(d[i+1]*mult); d[i+2]=cl(d[i+2]*mult);
    }
  ctx.putImageData(imgData,0,0);
}

// ═══════════════════════════════════════════════════════
// SVG overlay
// ═══════════════════════════════════════════════════════
function buildOverlay(w, h, typeKey, faceOk, headOk) {
  const { aspect, size } = TYPES[typeKey];
  let fH = h*.83, fW = fH*aspect;
  if(fW > w*.80) { fW=w*.80; fH=fW/aspect; }
  const fX=(w-fW)/2, fY=(h-fH)/2;
  const oCX=fX+fW/2, oCY=fY+fH*FG.cy;
  const oW=fW*FG.ow, oH=fH*FG.oh;
  const eY=fY+fH*FG.ey, crY=fY+fH*FG.cy3, chY=fY+fH*FG.cy2;

  const allOk = faceOk==='ok' && (headOk==='ok'||headOk==='n/a');
  const ovalC = allOk ? 'rgba(74,222,128,.85)'
              : faceOk==='none' ? 'rgba(245,200,66,.5)'
              : 'rgba(249,115,22,.75)';
  const cornerC = allOk ? '#4ade80' : '#F5C842';
  const L=16;
  const corners=[[fX,fY,1,1],[fX+fW,fY,-1,1],[fX,fY+fH,1,-1],[fX+fW,fY+fH,-1,-1]];
  const room = w-(fX+fW) > 38;
  const lb = fX+fW+8;

  let svg = `<svg xmlns='http://www.w3.org/2000/svg' width='${w}' height='${h}' viewBox='0 0 ${w} ${h}'>
  <defs><mask id='m'><rect width='100%' height='100%' fill='white'/><rect x='${fX}' y='${fY}' width='${fW}' height='${fH}' fill='black'/></mask></defs>
  <rect width='100%' height='100%' fill='rgba(0,0,0,.5)' mask='url(#m)'/>
  <rect x='${fX}' y='${fY}' width='${fW}' height='${fH}' fill='none' stroke='rgba(232,213,163,.45)' stroke-width='1.2'/>`;

  for(const [cx,cy,dx,dy] of corners) {
    svg += `<line x1='${cx}' y1='${cy}' x2='${cx+dx*L}' y2='${cy}' stroke='${cornerC}' stroke-width='2.5' stroke-linecap='round'/>`;
    svg += `<line x1='${cx}' y1='${cy}' x2='${cx}' y2='${cy+dy*L}' stroke='${cornerC}' stroke-width='2.5' stroke-linecap='round'/>`;
  }

  svg += `<ellipse cx='${oCX}' cy='${oCY}' rx='${oW/2}' ry='${oH/2}' fill='none' stroke='${ovalC}' stroke-width='1.8' stroke-dasharray='5,4'/>`;
  svg += `<line x1='${fX+fW*.28}' y1='${crY}' x2='${fX+fW*.72}' y2='${crY}' stroke='rgba(245,200,66,.28)' stroke-width='1' stroke-dasharray='3,5'/>`;
  svg += `<line x1='${fX+fW*.18}' y1='${eY}'  x2='${fX+fW*.82}' y2='${eY}'  stroke='rgba(100,200,255,.28)' stroke-width='1' stroke-dasharray='3,5'/>`;
  svg += `<line x1='${fX+fW*.28}' y1='${chY}' x2='${fX+fW*.72}' y2='${chY}' stroke='rgba(245,200,66,.28)' stroke-width='1' stroke-dasharray='3,5'/>`;
  svg += `<text x='${fX+fW/2}' y='${fY-7}' fill='rgba(232,213,163,.65)' font-size='10' font-family='monospace' text-anchor='middle' letter-spacing='1'>${size}</text>`;
  if(room) {
    svg += `<text x='${lb}' y='${crY+4}'  fill='rgba(245,200,66,.55)'  font-size='9' font-family='monospace'>темя</text>`;
    svg += `<text x='${lb}' y='${eY+4}'   fill='rgba(100,200,255,.55)' font-size='9' font-family='monospace'>глаза</text>`;
    svg += `<text x='${lb}' y='${chY+4}'  fill='rgba(245,200,66,.55)'  font-size='9' font-family='monospace'>подб.</text>`;
  }
  svg += `</svg>`;
  return svg;
}

// ═══════════════════════════════════════════════════════
// Main App (vanilla JS, no React — faster on mobile)
// ═══════════════════════════════════════════════════════
const root = document.getElementById('root');

const state = {
  photoType: 'passport',
  facingMode: 'user',
  captured: null,
  flash: false,
  processing: false,
  faceStatus: 'loading',   // loading|none|too_far|too_close|off_center|ok
  headStatus: 'loading',   // loading|ok|tilt_left|tilt_right|turn_left|turn_right|look_up|look_down|n/a
  lightStatus: 'checking', // checking|dark|bright|uneven|ok
  modelReady: false,
  bgRemove: false,
};

// DOM refs
let video, liveCanvas, captureCanvas, svgEl, hintEl, flashEl;
let sdFace, sdHead, sdLight, stFace, stHead, stLight;
let captureBtn;
let blazeModel = null;
let analyzeTimer = null;
let rafId = null;
let stream = null;

function render() {
  root.innerHTML = buildUI();
  bindRefs();
  startCamera();
  startModel();
}

function buildUI() {
  const t = TYPES[state.photoType];
  return `
<div class="app">
  <div class="hdr">
    <div class="hdr-title">⊞ ФОТО НА ДОКУМЕНТЫ РФ</div>
    <div class="pills">
      ${Object.entries(TYPES).map(([k,v])=>`
        <button class="pill${state.photoType===k?' on':''}" onclick="setType('${k}')">${v.label}</button>
      `).join('')}
    </div>
    <div class="sub">${t.size} · ${t.desc}</div>
  </div>

  ${state.captured ? buildPreview() : buildViewfinder()}

  ${!state.captured ? `
  <div class="sbar" id="sbar">
    ${buildStatusPill('face', state.faceStatus)}
    ${buildStatusPill('head', state.headStatus)}
    ${buildStatusPill('light', state.lightStatus)}
  </div>` : ''}

  ${!state.modelReady && !state.captured ? `<div class="mbar"><div class="mbar-inner"></div></div>` : ''}

  <div class="ctrl">
    ${state.captured ? `
      <button class="abtn" onclick="retake()">↩ Переснять</button>
      <button class="abtn p" onclick="download()">↓ Сохранить</button>
    ` : `
      <button class="icobtn" onclick="flipCam()" title="Переключить камеру">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7h-9"/><path d="M14 17H5"/>
          <polyline points="17 4 20 7 17 10"/><polyline points="8 14 5 17 8 20"/>
        </svg>
      </button>
      <button class="cbtn${isReady()?' rdy':''}" id="cbtn" onclick="capturePhoto()">
        <div class="ci"></div>
      </button>
      <button class="icobtn${state.bgRemove?' on':''}" onclick="toggleBg()" title="Замена фона">🪄</button>
    `}
  </div>

  <div class="req">
    <h4>ТРЕБОВАНИЯ ГОСТ Р 52425-2005</h4>
    <div class="req-g">
      ${REQS.map(([k,v])=>`
        <div class="ri"><span class="rk">${k}</span><span class="rv">${v||t.size}</span></div>
      `).join('')}
    </div>
  </div>
</div>`;
}

function buildViewfinder() {
  return `
<div class="vf" id="vf">
  <video id="vid" autoplay playsinline muted style="position:absolute;width:1px;height:1px;opacity:0"></video>
  <canvas id="liveC" class="live${state.facingMode==='user'?' mirror':''}"></canvas>
  <div id="svgOv" class="svg-ov"></div>
  <div id="flashEl" style="display:none" class="flash"></div>
  ${state.processing ? `<div class="proc"><div class="spin"></div><p>ОБРАБОТКА</p><small>${state.bgRemove?'удаление фона · ':''}коррекция света</small></div>` : ''}
  <div id="hintEl" class="hint"></div>
</div>`;
}

function buildPreview() {
  return `
<div class="vf">
  <div class="prev">
    <img src="${state.captured}" alt="preview"/>
    <div class="prev-badge"><span style="color:#4ade80">✓</span> Фото готово</div>
  </div>
</div>`;
}

const PILL_CONF = {
  face: {
    loading:    ['#666','Инициализация...'],
    none:       ['#ef4444','Лицо не найдено'],
    too_close:  ['#f97316','Отойдите дальше'],
    too_far:    ['#f97316','Подойдите ближе'],
    off_center: ['#f97316','Выровняйте центр'],
    ok:         ['#4ade80','Позиция ✓'],
  },
  head: {
    loading:    ['#666','Анализ...'],
    'n/a':      ['#888','Голова — вручную'],
    tilt_left:  ['#f97316','Наклон влево'],
    tilt_right: ['#f97316','Наклон вправо'],
    turn_left:  ['#f97316','Повернитесь вправо'],
    turn_right: ['#f97316','Повернитесь влево'],
    look_up:    ['#f97316','Опустите подбородок'],
    look_down:  ['#f97316','Поднимите подбородок'],
    ok:         ['#4ade80','Голова ✓'],
  },
  light: {
    checking: ['#666','Свет — анализ...'],
    dark:     ['#ef4444','Слишком темно'],
    bright:   ['#f97316','Слишком ярко'],
    uneven:   ['#f97316','Неравный свет'],
    ok:       ['#4ade80','Свет ✓'],
  },
};

function buildStatusPill(type, status) {
  const cfg = PILL_CONF[type];
  const [dot, text] = cfg[status] || cfg['loading'] || ['#666','...'];
  const border = dot==='#4ade80' ? 'rgba(74,222,128,.22)' : 'rgba(255,255,255,.07)';
  return `<div class="sp" style="border-color:${border}">
    <div class="sd" style="background:${dot}"></div>
    <span class="st" style="color:${dot}">${text}</span>
  </div>`;
}

function isReady() {
  return (state.faceStatus==='ok') &&
         (state.headStatus==='ok'||state.headStatus==='n/a') &&
         state.lightStatus==='ok';
}

function bindRefs() {
  video = document.getElementById('vid');
  liveCanvas = document.getElementById('liveC');
  captureCanvas = document.createElement('canvas');
  svgEl = document.getElementById('svgOv');
  hintEl = document.getElementById('hintEl');
  flashEl = document.getElementById('flashEl');
}

// ── Camera ─────────────────────────────────────────────
async function startCamera() {
  if(stream) stream.getTracks().forEach(t=>t.stop());
  cancelAnimationFrame(rafId);
  clearTimeout(analyzeTimer);
  state.faceStatus='loading'; state.headStatus='loading'; state.lightStatus='checking';
  updateStatusBar(); updateHint();

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:state.facingMode, width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    });
    if(!video) return;
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', () => {
      if(liveCanvas) { liveCanvas.width=video.videoWidth; liveCanvas.height=video.videoHeight; }
      startRenderLoop();
      scheduleAnalyze(800);
    }, {once:true});
  } catch(e) {
    const vf = document.getElementById('vf');
    if(vf) vf.insertAdjacentHTML('beforeend',`<div class="err"><i>📷</i>Нет доступа к камере.<br>Разрешите камеру в настройках браузера.</div>`);
  }
}

// ── Render loop ────────────────────────────────────────
function startRenderLoop() {
  const draw = () => {
    if(!video||!liveCanvas||video.readyState<2) { rafId=requestAnimationFrame(draw); return; }
    const ctx = liveCanvas.getContext('2d');
    const vw=video.videoWidth, vh=video.videoHeight;
    // Resize canvas to match display size
    const rect=liveCanvas.getBoundingClientRect();
    if(rect.width>0 && liveCanvas.width!==Math.round(rect.width*devicePixelRatio)) {
      liveCanvas.width=Math.round(rect.width*devicePixelRatio);
      liveCanvas.height=Math.round(rect.height*devicePixelRatio);
    }
    const cw=liveCanvas.width, ch=liveCanvas.height;
    const scale=Math.max(cw/vw,ch/vh);
    const dw=vw*scale, dh=vh*scale;
    ctx.drawImage(video,(cw-dw)/2,(ch-dh)/2,dw,dh);
    // Update SVG overlay
    if(svgEl) {
      const svg=buildOverlay(cw,ch,state.photoType,state.faceStatus,state.headStatus);
      svgEl.innerHTML=svg;
      svgEl.style.width=cw+'px'; svgEl.style.height=ch+'px';
    }
    rafId=requestAnimationFrame(draw);
  };
  rafId=requestAnimationFrame(draw);
}

// ── BlazeFace model ────────────────────────────────────
async function startModel() {
  try {
    await tf.setBackend('webgl');
    blazeModel = await blazeface.load();
    state.modelReady=true;
    // Remove loading bar
    const mb=document.querySelector('.mbar');
    if(mb)mb.remove();
  } catch(e) {
    console.warn('BlazeFace load failed:',e);
    state.modelReady=false;
    state.faceStatus='n/a'; state.headStatus='n/a';
    updateStatusBar(); updateHint();
  }
}

// ── Analysis loop ──────────────────────────────────────
function scheduleAnalyze(delay=700) {
  clearTimeout(analyzeTimer);
  analyzeTimer = setTimeout(runAnalysis, delay);
}

async function runAnalysis() {
  if(state.captured) return;
  const vid=video;
  if(!vid||vid.readyState<2||!vid.videoWidth) { scheduleAnalyze(500); return; }

  // Brightness
  try {
    const {avg,evenness}=analyzeBrightness(vid);
    if(avg<72)           state.lightStatus='dark';
    else if(avg>230)     state.lightStatus='bright';
    else if(evenness>.3) state.lightStatus='uneven';
    else                 state.lightStatus='ok';
  } catch{ state.lightStatus='ok'; }

  // Face + head
  if(blazeModel) {
    try {
      const preds = await blazeModel.estimateFaces(vid, false);
      if(preds.length) {
        const r = analyzeFace(preds[0], vid.videoWidth, vid.videoHeight);
        state.faceStatus = r.pos;
        state.headStatus = r.head;
      } else {
        state.faceStatus='none'; state.headStatus='n/a';
      }
    } catch{ state.faceStatus='ok'; state.headStatus='n/a'; }
  } else if(state.modelReady===false && state.faceStatus==='loading') {
    state.faceStatus='n/a'; state.headStatus='n/a';
  }

  updateStatusBar();
  updateHint();
  scheduleAnalyze(700);
}

function updateStatusBar() {
  const sbar=document.getElementById('sbar');
  if(!sbar) return;
  sbar.innerHTML=
    buildStatusPill('face',state.faceStatus)+
    buildStatusPill('head',state.headStatus)+
    buildStatusPill('light',state.lightStatus);
}

function updateHint() {
  if(!hintEl) return;
  let txt='', cls='';
  const f=state.faceStatus, h=state.headStatus, l=state.lightStatus;
  if(f==='loading')      { txt='Инициализация...'; }
  else if(f==='none')    { txt='Встаньте перед камерой'; cls='warn'; }
  else if(f==='too_close'){txt='Отойдите дальше'; cls='warn'; }
  else if(f==='too_far') { txt='Подойдите ближе'; cls='warn'; }
  else if(f==='off_center'){txt='Выровняйте лицо по центру'; cls='warn'; }
  else if(h==='tilt_left') {txt='Наклоните голову вправо'; cls='warn'; }
  else if(h==='tilt_right'){txt='Наклоните голову влево'; cls='warn'; }
  else if(h==='turn_left') {txt='Повернитесь правее'; cls='warn'; }
  else if(h==='turn_right'){txt='Повернитесь левее'; cls='warn'; }
  else if(h==='look_up')   {txt='Опустите подбородок'; cls='warn'; }
  else if(h==='look_down') {txt='Поднимите подбородок'; cls='warn'; }
  else if(l==='dark')   { txt='Добавьте освещения'; cls='warn'; }
  else if(l==='bright') { txt='Уменьшите яркость'; cls='warn'; }
  else if(l==='uneven') { txt='Нужен равномерный свет с двух сторон'; cls='warn'; }
  else if(isReady())    { txt='✓ Готово — нажмите кнопку'; cls='ok'; }
  else                  { txt='Совместите лицо с овалом'; }
  hintEl.textContent=txt;
  hintEl.className='hint'+(cls?' '+cls:'');
  // Pulse capture button
  const cb=document.getElementById('cbtn');
  if(cb) { cb.className='cbtn'+(isReady()?' rdy':''); }
}

// ── Capture ────────────────────────────────────────────
async function capturePhoto() {
  if(!video||video.readyState<2) return;
  state.processing=true;

  // Show flash
  if(flashEl) { flashEl.style.display='block'; setTimeout(()=>{if(flashEl)flashEl.style.display='none';},220); }

  // Crop to document aspect ratio from video centre
  const { aspect } = TYPES[state.photoType];
  const vw=video.videoWidth, vh=video.videoHeight;
  let cW,cH;
  if(vw/vh > aspect) { cH=vh; cW=Math.round(vh*aspect); }
  else               { cW=vw; cH=Math.round(vw/aspect); }
  const srcX=Math.round((vw-cW)/2), srcY=Math.round((vh-cH)/2);

  captureCanvas.width=cW; captureCanvas.height=cH;
  const ctx=captureCanvas.getContext('2d');

  // Mirror front camera correctly
  if(state.facingMode==='user') {
    ctx.save();
    ctx.translate(cW,0);
    ctx.scale(-1,1);
    ctx.drawImage(video, srcX, srcY, cW, cH, 0, 0, cW, cH);
    ctx.restore();
  } else {
    ctx.drawImage(video, srcX, srcY, cW, cH, 0, 0, cW, cH);
  }

  // Show processing overlay
  const vf=document.getElementById('vf');
  if(vf) {
    const po=document.createElement('div');
    po.className='proc';
    po.innerHTML=`<div class="spin"></div><p>ОБРАБОТКА</p><small>${state.bgRemove?'удаление фона · ':''}коррекция света</small>`;
    vf.appendChild(po);
  }

  await new Promise(r=>setTimeout(r,60));

  try {
    if(state.bgRemove) removeBackground(ctx, cW, cH);
    smoothLight(ctx, cW, cH);
  } catch(e) { console.warn('Post-proc error:',e); }

  state.captured = captureCanvas.toDataURL('image/jpeg', 0.95);
  state.processing=false;
  cancelAnimationFrame(rafId);
  clearTimeout(analyzeTimer);
  render();
}

// ── Controls ───────────────────────────────────────────
function setType(t) { state.photoType=t; render(); }

function flipCam() {
  state.facingMode = state.facingMode==='user' ? 'environment' : 'user';
  render();
}

function toggleBg() {
  state.bgRemove = !state.bgRemove;
  // Re-render controls only
  const btns=document.querySelectorAll('.icobtn');
  btns.forEach(b=>{ if(b.title==='Замена фона') b.className='icobtn'+(state.bgRemove?' on':''); });
}

function retake() {
  state.captured=null;
  render();
}

function download() {
  if(!state.captured) return;
  const a=document.createElement('a');
  a.href=state.captured; a.download=`doc_photo_${Date.now()}.jpg`; a.click();
}

// ── Boot ───────────────────────────────────────────────
render();
</script>
</body>

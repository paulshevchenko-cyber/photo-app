async function captureBurst() {
  if (!vid.videoWidth) { toast('Камера не готова', 'warn'); return; }
  Log.info('captureBurst start');
  gShots = [];
  // Pre-roll countdown so the operator can position the child.
  for (const n of [3, 2, 1]) {
    setHint(`Начнём через ${n}…`, 'warn');
    await new Promise(r => setTimeout(r, 700));
  }
  let detected = 0;
  for (let i=0; i<BURST_COUNT; i++) {
    setHint(`Снимок ${i+1}/${BURST_COUNT} (найдено ${detected})`);
    const fl = document.createElement('div'); fl.className='flash';
    vfEl.appendChild(fl); setTimeout(() => fl.remove(), 180);
    await new Promise(r => setTimeout(r, 200));
    const shot = grabFrame();
    const m = await measureFaceMetrics(shot);
    if (m) detected++;
    gShots.push({ dataUrl: shot, metrics: m });
    Log.info(`burst ${i+1}/${BURST_COUNT}: face=${m ? 'yes' : 'no'}`);
    await new Promise(r => setTimeout(r, 500));
  }
  Backup.saveBurst(gShots);
  finalizeShots();
}

async function ingestUploads(files) {
  if (files.length < UPLOAD_MIN) { toast(`Загрузите хотя бы ${UPLOAD_MIN} фото (рекомендуем ${UPLOAD_RECOMMENDED})`, 'warn'); return; }
  if (files.length > UPLOAD_MAX) { toast(`Слишком много (${files.length}). Максимум ${UPLOAD_MAX}`, 'warn'); return; }
  const po = showProcessing('читаем фото и ищем лица…');
  po.step(`Загрузка ${files.length} фото`);
  gShots = [];
  try {
    let i = 0;
    for (const f of files) {
      i++;
      po.substep(`Фото ${i}/${files.length}: ${f.name||'без имени'} (${(f.size/1024).toFixed(0)} КБ)`);
      po.progress(i / (files.length * 2));
      const dataUrl = await fileToDataUrl(f);
      po.substep(`Фото ${i}/${files.length}: ищем лицо`);
      po.progress((i + .5) / (files.length * 2));
      const m = await measureFaceMetrics(dataUrl);
      gShots.push({ dataUrl, metrics: m });
      Log.info(`upload ${i}/${files.length}: face=${m ? 'yes' : 'no'}`);
      po.progress((i + 1) / (files.length * 2));
    }
  } catch (e) {
    Log.error('ingestUploads:', e);
    po.remove();
    toast('Ошибка при чтении: ' + (e.message||e), 'err');
    return;
  }
  po.remove();
  Backup.saveBurst(gShots);
  finalizeShots();
}

function finalizeShots() {
  const valid = gShots.filter(s => s.metrics);
  if (!valid.length) { toast('Лицо ни на одном фото не найдено', 'err'); return; }
  if (gChildSrc === 'upload' && valid.length < UPLOAD_MIN) {
    toast(`Валидных фото только ${valid.length}. Добавьте ещё.`, 'warn');
  }
  gRefMetrics = pickBestMetrics(valid);
  showBurstStrip();
}

function pickBestMetrics(shots) {
  let best = shots[0].metrics;
  let bestScore = Math.abs(best.yaw) + Math.abs(best.roll);
  for (const s of shots) {
    if (!s.metrics) continue;
    const score = Math.abs(s.metrics.yaw) + Math.abs(s.metrics.roll);
    if (score < bestScore) { best = s.metrics; bestScore = score; }
  }
  return { ...best };
}

function grabFrame() {
  const c = document.createElement('canvas');
  c.width = vid.videoWidth; c.height = vid.videoHeight;
  const x = c.getContext('2d');
  if (gFacing === 'user') { x.save(); x.translate(c.width, 0); x.scale(-1, 1); x.drawImage(vid, 0, 0); x.restore(); }
  else x.drawImage(vid, 0, 0);
  return c.toDataURL('image/jpeg', .92);
}

/* MediaPipe Face Detection on a static image — returns
   normalized metrics: { iod, e2c, n2m, yaw, roll } or null.
   Calls are serialized so the live handler can be restored cleanly. */
let _fdQueue = Promise.resolve();
async function measureFaceMetrics(dataUrl) {
  if (!gModelReady || !window._fd) return null;
  let img;
  try { img = await loadImage(dataUrl); } catch (e) { Log.warn('measureFaceMetrics loadImage:', e); return null; }
  const run = () => new Promise(res => {
    const settle = (v) => {
      // restore live handler before resolving so the next live send works
      try { window._fd.onResults(_fdLiveHandler || (() => {})); } catch(e) {}
      res(v);
    };
    const once = (r) => {
      if (!r.detections || !r.detections.length) return settle(null);
      // Use the largest face (most likely the subject) but report total count
      const faceCount = r.detections.length;
      const det = r.detections.reduce((a,b) =>
        (a.boundingBox.width * a.boundingBox.height) >= (b.boundingBox.width * b.boundingBox.height) ? a : b);
      const bb = det.boundingBox, lm = det.landmarks;
      if (!lm || lm.length < 4) return settle(null);
      const re=lm[0], le=lm[1], nose=lm[2], mouth=lm[3];
      const iod = Math.abs(le.x - re.x);
      const eyeMidY = (re.y + le.y)/2;
      const e2c = (bb.yCenter + bb.height/2) - eyeMidY;
      const n2m = mouth.y - nose.y;
      const yaw = (nose.x - (re.x + le.x)/2) / bb.width;
      const roll = Math.atan2(le.y-re.y, le.x-re.x) * 180/Math.PI;
      // Доп. метрики для ГОСТ-чека: высота bbox как доля кадра (~доля головы),
      // и линия глаз от низа кадра (1 - eyeMidY).
      // bbox не покрывает темя (волосы), поэтому headPct ≈ bb.height * 1.18 эмпирически.
      const bboxHeight = Math.min(1, bb.height * 1.18);
      const eyeFromBottom = 1 - eyeMidY;
      // Координаты центра лица для smart-reframe
      const bboxCenterX = bb.xCenter;
      const bboxCenterY = bb.yCenter;
      const eyeYRel = eyeMidY;  // 0..1 от верха кадра
      settle({ iod, e2c, n2m, yaw, roll, faceCount, bboxHeight, eyeFromBottom, bboxCenterX, bboxCenterY, eyeYRel });
    };
    try { window._fd.onResults(once); } catch (e) { return settle(null); }
    const timeout = setTimeout(() => settle(null), 3000);
    window._fd.send({ image: img })
      .then(() => clearTimeout(timeout))
      .catch((e) => { clearTimeout(timeout); Log.warn('fd.send static:', e); settle(null); });
  });
  // serialize
  const p = _fdQueue.then(run);
  _fdQueue = p.catch(() => {});
  return p;
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function fileToDataUrl(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(f);
  });
}

function showBurstStrip() {
  vfEl.querySelectorAll('.bstrip').forEach(e => e.remove());
  const valid = gShots.filter(s => s.metrics).length;
  const strip = document.createElement('div');
  strip.className = 'bstrip';
  strip.innerHTML = `
    <div class="bstrip-h">
      <span>Кадров: ${valid} из ${gShots.length}</span>
      <button class="abtn" style="flex:0 0 auto;padding:4px 10px" onclick="closeBurstStrip()">✕</button>
    </div>
    <div class="bstrip-grid">
      ${gShots.map((s, i) => `
        <div class="bthumb ${s.metrics?'ok':'bad'}" onclick="useShot(${i})">
          <img src="${s.dataUrl}" alt=""/>
          ${s.metrics ? '' : '<span class="bthumb-x">×</span>'}
        </div>`).join('')}
    </div>
    <div class="bstrip-act">
      <button class="abtn p" onclick="composeAi()">🎨 Объединить через AI</button>
    </div>`;
  vfEl.appendChild(strip);
}

function closeBurstStrip() { vfEl.querySelectorAll('.bstrip').forEach(e => e.remove()); }

async function useShot(idx) {
  const s = gShots[idx]; if (!s) return;
  closeBurstStrip();
  Log.info(`useShot ${idx}`);
  const po = showProcessing('кадр ' + (idx+1));
  po.step('Обработка выбранного кадра');
  try {
    po.substep('декодирование'); po.progress(0.2);
    const img = await loadImage(s.dataUrl);
    const { aspect } = TYPES[gType];
    let cW, cH;
    if (img.width/img.height > aspect) { cH = img.height; cW = (img.height*aspect)|0; }
    else                                { cW = img.width;  cH = (img.width/aspect)|0; }
    const sx = ((img.width-cW)/2)|0, sy = ((img.height-cH)/2)|0;
    capCv.width = cW; capCv.height = cH;
    capCtx.drawImage(img, sx, sy, cW, cH, 0, 0, cW, cH);
    po.substep('пост-обработка'); po.progress(0.6);
    const url = await finalizeCapturedCanvas(capCv, { skipBgFill: true });
    po.progress(1);
    po.remove();
    Backup.saveFinal(url, { kind:'manual-pick', type: gType, idx });
    showPreview(url, { kind:'single' });
  } catch (e) {
    Log.error('useShot:', e);
    po.remove();
    toast('Ошибка: ' + (e.message||e), 'err');
  }
}

async function composeAi() {
  gAi = makeAiBackend();
  if (!gAi.configured) {
    toast('Введите API-ключ в настройках ⚙', 'warn');
    openSettings();
    return;
  }
  const valid = gShots.filter(s => s.metrics);
  if (!valid.length) { toast('Нет валидных кадров для AI', 'err'); return; }

  closeBurstStrip();
  const po = showProcessing(`${valid.length} фото для AI`);
  po.step('AI композиция');
  po.substep(`найдено ${valid.length} валидных кадров из ${gShots.length}`);
  Log.info(`composeAi start: valid=${valid.length}/${gShots.length} src=${gChildSrc}`);

  let aiUrl;
  try {
    const bestIdx = valid.indexOf(valid.reduce((a, b) =>
      (Math.abs(a.metrics.yaw)+Math.abs(a.metrics.roll) < Math.abs(b.metrics.yaw)+Math.abs(b.metrics.roll) ? a : b)
    ));
    po.step('Шаг 1/4: возраст референса');
    po.substep('AI читает фронтальный кадр…');
    po.progress(0.1);
    try {
      gRefAge = await gAi.estimateAge(valid[bestIdx].dataUrl);
      Log.info('refAge =', gRefAge);
      po.substep(gRefAge != null ? `референсный возраст ≈ ${gRefAge}` : 'возраст не определён (пропускаем)');
    } catch (e) { Log.warn('estimateAge ref failed:', e.message); gRefAge = null; }

    po.step(`Шаг 2/4: AI композирует (${valid.length} кадров)`);
    po.substep('отправляем в Gemini, ожидаем результат… до 30 сек');
    po.progress(0.25);
    const t0 = Date.now();
    aiUrl = await gAi.compose(valid, gRefMetrics, gChildSrc);
    Log.info(`AI compose done in ${((Date.now()-t0)/1000).toFixed(1)}s`);
    po.progress(0.6);
  } catch (e) {
    Log.error('composeAi failed:', e);
    po.remove();
    toast('AI: ' + (e.message||e) + '. Используйте лучший кадр вручную.', 'err');
    showBurstStrip();
    return;
  }

  po.step('Шаг 3/4: проверка пропорций');
  po.substep('MediaPipe измеряет геометрию лица…');
  po.progress(0.7);
  const aiMetrics = await measureFaceMetrics(aiUrl);
  const tol = TOLERANCE[gChildSrc] || 0.05;
  let okMetrics = true, badReason = '';
  if (!aiMetrics) { okMetrics = false; badReason = 'лицо на AI-результате не найдено'; }
  else if (gRefMetrics) {
    const dev = k => Math.abs(aiMetrics[k] - gRefMetrics[k]) / Math.max(Math.abs(gRefMetrics[k]), 1e-6);
    for (const k of ['iod','e2c','n2m']) {
      const d = dev(k);
      Log.info(`metric ${k}: ref=${gRefMetrics[k].toFixed(3)} ai=${aiMetrics[k].toFixed(3)} dev=${(d*100).toFixed(1)}%`);
      po.substep(`${k}: отклонение ${(d*100).toFixed(1)}% (макс ${(tol*100).toFixed(0)}%)`);
      if (d > tol) { okMetrics = false; badReason = `${k} отклонилось на ${(d*100).toFixed(1)}% (макс ${(tol*100).toFixed(0)}%)`; break; }
    }
  }
  po.progress(0.85);

  let okAge = true;
  if (okMetrics && gRefAge != null) {
    po.step('Шаг 4/4: проверка возраста');
    po.substep('AI оценивает возраст на результате…');
    po.progress(0.9);
    try {
      const aiAge = await gAi.estimateAge(aiUrl);
      Log.info(`age check: ref=${gRefAge} ai=${aiAge}`);
      if (aiAge != null) {
        po.substep(`возраст: исходный ≈ ${gRefAge}, AI ≈ ${aiAge}`);
        if (Math.abs(aiAge - gRefAge) > AGE_TOLERANCE_YEARS) {
          okAge = false; badReason = `AI оценил возраст ${aiAge}, исходный ${gRefAge} (отклонение > ${AGE_TOLERANCE_YEARS} лет)`;
        }
      }
    } catch(e) { Log.warn('estimateAge ai failed:', e.message); }
  }
  po.progress(1);

  po.remove();

  if (okMetrics && okAge) {
    const img = await loadImage(aiUrl);
    const t = TYPES[gType];
    const sw = img.width, sh = img.height;
    let cW, cH;
    if (sw/sh > t.aspect) { cH = sh; cW = (sh*t.aspect)|0; }
    else                  { cW = sw; cH = (sw/t.aspect)|0; }
    const sx = ((sw-cW)/2)|0, sy = ((sh-cH)/2)|0;
    capCv.width = cW; capCv.height = cH;
    capCtx.drawImage(img, sx, sy, cW, cH, 0, 0, cW, cH);
    const finalUrl = await finalizeCapturedCanvas(capCv, { skipBgFill: true });
    Log.info('composeAi: OK, saved as final');
    Backup.saveFinal(finalUrl, { kind:'ai-ok', src: gChildSrc, type: gType, refAge: gRefAge });
    showPreview(finalUrl, { kind:'ai-ok', src: gChildSrc==='upload' ? 'загрузка' : 'серия' });
    return;
  }

  Log.warn('composeAi: fallback to best frame —', badReason);
  toast(`AI исказил: ${badReason}. Используем лучший кадр.`, 'warn');
  const bestIdx = valid.indexOf(valid.reduce((a, b) =>
    (Math.abs(a.metrics.yaw)+Math.abs(a.metrics.roll) < Math.abs(b.metrics.yaw)+Math.abs(b.metrics.roll) ? a : b)
  ));
  const img = await loadImage(valid[bestIdx].dataUrl);
  const { aspect } = TYPES[gType];
  let cW, cH;
  if (img.width/img.height > aspect) { cH = img.height; cW = (img.height*aspect)|0; }
  else                                { cW = img.width;  cH = (img.width/aspect)|0; }
  const sx = ((img.width-cW)/2)|0, sy = ((img.height-cH)/2)|0;
  capCv.width = cW; capCv.height = cH;
  capCtx.drawImage(img, sx, sy, cW, cH, 0, 0, cW, cH);
  const url = await finalizeCapturedCanvas(capCv, { skipBgFill: true });
  Backup.saveFinal(url, { kind:'ai-fallback', reason: badReason, type: gType });
  showPreview(url, { kind:'ai-fb' });
}

function renderCtrl() {

    if (gChildSrc === 'burst') {
      ctrlEl.innerHTML = `
        <button class="icobtn" onclick="flipCam()" title="Поменять камеру">⇄</button>
        <button class="cbtn child" id="capBtn" onclick="doCapture()"><div class="ci"></div><span class="cn">5×</span></button>
        ${gPortraitCapable ? `<button class="icobtn ${gPortrait?'on':''}" onclick="togglePortrait()" title="Портрет">📷⊕</button>` : `<button class="icobtn" onclick="toggleBg()" id="bgBtn" title="AI фон">🪄</button>`}
      `;
    } else {
      ctrlEl.innerHTML = `
        <button class="abtn" onclick="fileMulti.click()">📁 Выбрать ${UPLOAD_MIN}–${UPLOAD_MAX} фото</button>

   Type, camera-flip, retake, background, settings, toast
═══════════════════════════════════════════════════════ */

function setType(k) {
  gType = k;
  if (gMode === 'child' && k !== 'passport') { /* keep child mode independent */ }
  document.querySelectorAll('.pills .pill').forEach((b, i) => {
    if (i < 3) b.classList.toggle('on', Object.keys(TYPES)[i] === k);
  });
  document.getElementById('subdesc').textContent = `${TYPES[k].size} · ${TYPES[k].desc}`;
  renderReqs();
}

function flipCam() {
  if (!Platform.secureContext()) return;
  gFacing = gFacing === 'user' ? 'environment' : 'user';
  retake();
}

function toggleBg() {
  gBgRemove = !gBgRemove;
  renderCtrl();
  if (gBgRemove && !gBgLoaded) {
    import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/browser/index.mjs')
      .then(m => { gRemoveBg = m.removeBackground; gBgLoaded = true; })
      .catch(e => { gBgRemove = false; renderCtrl(); toast('Удаление фона не загрузилось: ' + (e.message||e), 'warn'); });
  }
}

function retake() {
  gCaptured = false;
  vid.style.display=''; ov.style.display=''; hintEl.style.display='';
  vfEl.querySelector('.prev-wrap')?.remove();
  vfEl.querySelectorAll('.cam-err').forEach(e => e.remove());
  vfEl.querySelectorAll('.bstrip').forEach(e => e.remove());
  document.getElementById('sbar').style.opacity='1';
  renderCtrl();
  startCamera();
}

function dlPhoto(url) {
  const t = TYPES[gType];
  const name = `doc_photo_${gType}_${t.wMM}x${t.hMM}mm_${Date.now()}.jpg`;
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
}

function renderReqs() {
  const t = TYPES[gType];
  const headMmMin = (t.hMM * t.headPctMin).toFixed(0);
  const headMmMax = (t.hMM * t.headPctMax).toFixed(0);
  const reqs = [
    ['Размер', t.size],
    ['DPI', '300 (для печати)'],
    ['Высота головы', `${headMmMin}–${headMmMax} мм`],
    ['Линия глаз', `${(t.eyeFromBottomMin*t.hMM).toFixed(0)}–${(t.eyeFromBottomMax*t.hMM).toFixed(0)} мм от низа`],
    ['Фон', 'белый / светло-серый'],
    ['Взгляд', 'прямо в объектив'],
    ['Выражение', 'нейтральное'],
    ['Качество', 'без теней, резкое'],
  ];
  document.getElementById('rg').innerHTML =
    reqs.map(([k, v]) => `<div class="ri"><span class="rk">${k}</span><span class="rv">${v}</span></div>`).join('');
}

/* ═══════════════════════════════════════════════════════
   Settings modal
═══════════════════════════════════════════════════════ */

function openSettings() {
  closeModal();
  const backend = Platform.storage.get('aiBackend') || 'gemini';
  const key = Platform.storage.get('geminiKey') || '';
  const tgUrl = Platform.storage.get('tgBotUrl') || '';
  const ads = Platform.storage.get('ads') === '1';
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal" onclick="event.stopPropagation()">
      <h3>⚙ НАСТРОЙКИ</h3>
      <label>AI-бэкенд
        <select id="setBackend">
          <option value="gemini" ${backend==='gemini'?'selected':''}>Gemini напрямую (Nano Banana)</option>
          <option value="telegram" ${backend==='telegram'?'selected':''}>Telegram-бот (в разработке)</option>
        </select>
      </label>
      <div id="setGemini" ${backend!=='gemini'?'hidden':''}>
        <label>API-ключ Google AI Studio
          <input type="password" id="setKey" value="${escapeAttr(key)}" placeholder="AIza..."/>
        </label>
        <small>Получить ключ: <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa">aistudio.google.com/apikey</a><br>
        Ключ сохраняется ТОЛЬКО в этом браузере (localStorage). Не публикуйте копию приложения вместе со своим ключом — его украдут.</small>
      </div>
      <div id="setTg" ${backend!=='telegram'?'hidden':''}>
        <label>URL Telegram-бота (proxy endpoint)
          <input type="text" id="setTgUrl" value="${escapeAttr(tgUrl)}" placeholder="https://your-bot.example.com/compose"/>
        </label>
        <small>Архитектурный задел: на сервере крутится бот, держит ключ Gemini в ENV. Запросы из браузера идут к боту, ответ — изображение. Реализация пока заглушка.</small>
      </div>
      <label style="flex-direction:row;align-items:center;gap:8px">
        <input type="checkbox" id="setAds" ${ads?'checked':''}/> Показывать места под рекламу
      </label>
      <small>Реклама обычно скрыта в браузерной версии. На Android-сборке отключается автоматически.</small>

      <h3 style="margin-top:6px">🗂 Бэкапы и логи</h3>
      <div id="backupList" class="upload-help" style="text-align:left;padding:0">загружаем…</div>
      <div class="modal-row">
        <button class="abtn" onclick="Log.export(); toast('Лог сохранён', 'ok')">⤓ Экспорт лога</button>
        <button class="abtn" onclick="if(confirm('Очистить все бэкапы и логи?')) { Backup.clear(); Log.clear(); toast('Очищено','ok'); closeModal(); }">⊘ Очистить</button>
      </div>

      <div class="modal-row">
        <button class="abtn" onclick="closeModal()">Отмена</button>
        <button class="abtn p" onclick="saveSettings()">Сохранить</button>
      </div>
    </div>`;
  bg.onclick = closeModal;
  bg.querySelector('#setBackend').onchange = e => {
    bg.querySelector('#setGemini').hidden = e.target.value !== 'gemini';
    bg.querySelector('#setTg').hidden     = e.target.value !== 'telegram';
  };
  document.body.appendChild(bg);
  // Populate backup list async
  Backup.listFinals().then(list => {
    const el = bg.querySelector('#backupList');
    if (!el) return;
    if (!list.length) { el.innerHTML = '<i>нет сохранённых фото</i>'; return; }
    el.innerHTML = list.map(b => {
      const date = new Date(b.t).toLocaleString();
      const kind = b.meta?.kind || '?';
      return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid rgba(232,213,163,.06)">
        <img src="${b.url}" style="width:24px;height:auto;border:1px solid rgba(232,213,163,.2)"/>
        <span style="flex:1;font-size:9px">${date} · ${kind}</span>
        <button class="abtn" style="padding:3px 6px;font-size:9px;flex:0 0 auto" onclick="restoreBackup('${b.id}')">↺</button>
      </div>`;
    }).join('');
  });
}

async function restoreBackup(id) {
  const all = await Backup.listFinals();
  const item = all.find(b => b.id === id);
  if (!item) { toast('Не найдено', 'err'); return; }
  closeModal();
  Log.info('Restore backup:', id);
  showPreview(item.url, { kind:'single' });
}

function saveSettings() {
  const bg = document.querySelector('.modal-bg');
  if (!bg) return;
  const backend = bg.querySelector('#setBackend').value;
  Platform.storage.set('aiBackend', backend);
  if (backend === 'gemini') Platform.storage.set('geminiKey', bg.querySelector('#setKey').value.trim());
  else                      Platform.storage.set('tgBotUrl',  bg.querySelector('#setTgUrl').value.trim());
  Platform.storage.set('ads', bg.querySelector('#setAds').checked ? '1' : '0');
  closeModal();
  gAi = makeAiBackend();
  initAdSlots();
  toast('Настройки сохранены', 'ok');
}

function closeModal() {
  document.querySelectorAll('.modal-bg').forEach(e => e.remove());
}

function escapeAttr(s) { return String(s).replace(/[<>"&]/g, c => ({ '<':'&lt;', '>':'&gt;', '"':'&quot;', '&':'&amp;' }[c])); }

/* ═══════════════════════════════════════════════════════
   Toast
═══════════════════════════════════════════════════════ */

let _toastTimer = null;
function toast(msg, kind) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const t = document.createElement('div');
  t.className = 'toast' + (kind ? ' '+kind : '');
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.remove(), 4500);
}

</script>
</body>
</html>
